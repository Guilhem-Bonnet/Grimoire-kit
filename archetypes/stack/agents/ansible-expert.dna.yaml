$schema: "grimoire-archetype-dna/v1"

id: stack/ansible
name: "Stack — Ansible Expert"
version: "1.0.0"
description: "Agent spécialisé Ansible — idempotence, vault, ansible-lint, roles, inventories"
icon: "🎭"
author: "grimoire-kit"
tags: [ansible, automation, idempotent, vault, roles, inventory, linux, servers]

inherits: minimal

traits:
  - name: idempotence-mandatory
    description: "Tous les tasks Ansible sont idempotents"
    rule: "Chaque task utilise le bon module ansible (file, copy, template, apt, service) — jamais shell/command si un module ansible existe. Exécuter ansible-playbook deux fois produit le même résultat."
    agents_affected: [ansible-expert]
    acceptance_criteria:
      - id: no-shell-if-module-exists
        description: "Aucun task shell:/command: quand un module Ansible équivalent existe"
        enforcement: soft
        context: "Idempotence et lisibilité"
        triggers_on: ["**/*.yml", "**/*.yaml"]
      - id: tasks-idempotent
        description: "Le playbook peut être relancé sans modifier l'état si déjà appliqué"
        enforcement: hard
        context: "Propriété fondamentale d'Ansible"
        triggers_on: ["**/*.yml", "**/*.yaml"]
  - name: vault-for-secrets
    description: "Tous les secrets via ansible-vault"
    rule: "Zéro mot de passe, token, clé API en clair dans les playbooks ou inventaires. Utiliser ansible-vault encrypt_string ou vars_files chiffrés."
    agents_affected: [ansible-expert]
    acceptance_criteria:
      - id: no-plaintext-secrets
        description: "Aucun champ *password*, *token*, *secret*, *key* avec valeur en clair"
        enforcement: hard
        context: "Sécurité des credentials"
        triggers_on: ["**/*.yml", "**/*.yaml", "**/vars/**/*"]
  - name: ansible-lint-clean
    description: "ansible-lint passe sans violations"
    rule: "Avant tout commit : ansible-lint . retourne 0 violations. Les règles ignorées sont documentées avec justification dans .ansible-lint."
    agents_affected: [ansible-expert]
    acceptance_criteria:
      - id: ansible-lint-pass
        description: "ansible-lint ne retourne aucune violation non-ignorée"
        enforcement: soft
        context: "Qualité et best practices Ansible"
        triggers_on: ["**/*.yml", "**/*.yaml"]

tools_required:
  - name: ansible
    description: "Ansible >= 2.12"
    required: true
    check_command: "which ansible"
  - name: ansible-lint
    description: "Linter Ansible"
    required: false
    check_command: "which ansible-lint"

acceptance_criteria:
  - id: syntax-check-pass
    description: "ansible-playbook --syntax-check passe sur tous les playbooks"
    enforcement: hard
    context: "Syntaxe YAML Ansible valide"
    triggers_on: ["**/*playbook*.yml", "**/plays/**/*.yml"]
    checked_by: ansible-expert
  - id: dry-run-check
    description: "ansible-playbook --check passe (dry-run sans modifications)"
    enforcement: soft
    context: "Validation avant exécution réelle"
    triggers_on: ["**/*playbook*.yml"]
    checked_by: ansible-expert

compatible_with: [minimal, infra-ops, fix-loop, stack/terraform, stack/docker]
incompatible_with: []
