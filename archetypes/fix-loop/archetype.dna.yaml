$schema: "grimoire-archetype-dna/v1"

id: fix-loop
name: "Fix Loop"
version: "1.0.0"
description: "Boucle de correction certifiée — zéro 'done' sans preuve d'exécution. FER sessions isolées, sévérité adaptative S1/S2/S3"
icon: "🔁"
author: "grimoire-kit"
tags: [fix, loop, tdd, certification, regression, evidence, quality]

inherits: minimal

traits:
  - name: proof-of-execution
    description: "Toute déclaration 'done' exige une preuve d'exécution"
    rule: "JAMAIS écrire 'terminé', 'fait', 'corrigé' sans joindre : 1) la commande exécutée, 2) la sortie réelle, 3) le CC PASS. Une déclaration sans preuve est un mensonge."
    agents_affected: "*"
  - name: fer-isolation
    description: "Chaque session fix est isolée dans un FER (Fix Evidence Record)"
    rule: "Créer un fichier YAML FER au début de chaque session de fix. Y enregistrer chaque cycle test/fix/verify. Clore le FER avec signature avant de passer au ticket suivant."
    agents_affected: [fix-loop-orchestrator]
  - name: severity-adaptive
    description: "Processus adaptatif selon la sévérité S1/S2/S3"
    rule: "S3 (mineur) = cycle rapide 3 phases. S2 (moyen) = cycle standard 6 phases. S1 (critique) = toutes les 9 phases obligatoires incluant META-REVIEW et regression-check complet."
    agents_affected: [fix-loop-orchestrator]
  - name: never-assume-fixed
    description: "Ne jamais supposer qu'un fix est passé sans preuve"
    rule: "Après chaque fix : re-exécuter TOUS les tests liés, pas seulement le test ciblé. Un fix qui casse un autre test = FER non clos."
    agents_affected: "*"

constraints:
  - id: no-done-without-proof
    description: "Impossible de clore un FER sans preuve de CC PASS"
    enforcement: hard
    checked_by: fix-loop-orchestrator
  - id: no-parallel-fer
    description: "Maximum 1 FER actif par session (éviter l'entrelacement)"
    enforcement: soft
    checked_by: fix-loop-orchestrator
  - id: regression-check-mandatory
    description: "Vérification anti-régression obligatoire en fin de session"
    enforcement: hard
    checked_by: fix-loop-orchestrator

values:
  - name: evidence-over-trust
    description: "La preuve prime sur la confiance aveugle dans le LLM"
    priority: 1
  - name: zero-regression
    description: "Un fix qui introduit une régression est pire qu'aucun fix"
    priority: 1
  - name: isolated-context
    description: "Chaque cycle FER est isolé du contexte des autres cycles"
    priority: 2

tools_required:
  - name: bash
    description: "Exécution des scripts cc-verify.sh et des cycles de test"
    required: true
    check_command: "which bash"
  - name: python3
    description: "Scripts de test Python + gen-tests.py"
    required: false
    check_command: "which python3"

acceptance_criteria:
  - id: fer-created-before-fix
    description: "Un FER YAML doit être créé au début de chaque session de fix avant d'écrire la première ligne de code"
    enforcement: hard
    context: "Trait fer-isolation — chaque cycle fix est tracer dans un Fix Evidence Record"
    triggers_on: ["**/*"]
    checked_by: fix-loop-orchestrator
  - id: all-tests-rerun-after-fix
    description: "Après chaque fix : toute la suite de tests liée doit être re-exécutée, pas seulement le test ciblé"
    enforcement: hard
    context: "Trait never-assume-fixed — un fix qui casse un autre test = FER non clos"
    triggers_on: ["**/*.spec.*", "**/*.test.*", "**/*_test.*"]
    checked_by: fix-loop-orchestrator
  - id: fer-closed-with-cc-pass
    description: "Un FER ne peut pas être clos sans CC PASS attaché"
    enforcement: hard
    context: "Trait proof-of-execution + contrainte no-done-without-proof"
    triggers_on: ["**/*"]
    checked_by: fix-loop-orchestrator
  - id: severity-protocol-followed
    description: "Le protocole de sévérité correct est suivi (S3=3 phases, S2=6, S1=9)"
    enforcement: soft
    context: "Trait severity-adaptive"
    triggers_on: ["**/*"]
    checked_by: fix-loop-orchestrator

agents:
  - path: "../../archetypes/fix-loop/agents/fix-loop-orchestrator.tpl.md"
    required: true
    description: "Loop — Orchestrateur boucle fermée, FER, sévérité adaptative, META-REVIEW"

workflows:
  - path: "../../archetypes/fix-loop/workflows/workflow-closed-loop-fix.tpl.md"
    required: true
    description: "Workflow 9 phases boucle de correction certifiée"

shared_context_template: null
prompts_directory: null

compatible_with: [minimal, infra-ops, web-app, stack/go, stack/typescript, stack/python]
incompatible_with: []
requires: []

auto_detect:
  files: []
  directories: []
  confidence_boost: 0    # N'est pas auto-détecté — doit être explicitement demandé
  exclusive: false

changelog:
  - version: "1.0.0"
    date: "2026-02-27"
    changes:
      - "DNA initiale — traits proof-of-execution, FER-isolation, severity-adaptive, never-assume-fixed"
