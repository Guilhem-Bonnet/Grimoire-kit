$schema: "grimoire-archetype-dna/v1"

id: game-dev
name: "Game Dev"
version: "1.0.0"
description: "Création de jeux vidéo gouvernée — GDD source de vérité, simulation déterministe, équilibrage prouvé, certification par preuve, live ops sourcée. 8 disciplines agentiques."
icon: "🎮"
author: "grimoire-kit"
tags: [game, gamedev, gdd, gameplay, balance, playtest, determinism, certification, liveops, godot, unity, unreal]

inherits: minimal

traits:
  - name: gdd-source-of-truth
    description: "Le GDD/bible est l'unique source de vérité versionnée."
    rule: "Tout contenu généré (classe, compétence, niveau, item, lore) se rattache explicitement à une entrée du GDD. Une divergence GDD/build est un défaut à corriger ou documenter, jamais une variante silencieuse. (GR-01, UC-08)"
    agents_affected: "*"
  - name: deterministic-simulation
    description: "Toute simulation testée est rejouable."
    rule: "Seed, pas de temps fixe et hash d'état sont obligatoires pour tout test, replay ou debug réseau. Le parallélisme (threads) doit produire un résultat identique à seed égal : fusionner les sorties de façon ordonnée. (GR-03, UC-13)"
    agents_affected: [gameplay-programmer, game-qa, systems-economist]
  - name: balance-by-regression
    description: "Pas de changement d'équilibrage sans non-régression."
    rule: "Toute modification de balance ou d'économie passe une simulation de non-régression (winrate, TTK, inflation) avant merge. Joindre un Balance Regression Evidence. (GR-06, GR-05, UC-10)"
    agents_affected: [systems-economist, gameplay-programmer]
  - name: content-validation-gate
    description: "Gate de validation de contenu avant merge."
    rule: "Budgets, références, naming, cohérence design et lore, classification d'âge sont vérifiés avant intégration. Joindre un Content Validation Record. (GR-07, UC-09, UC-12)"
    agents_affected: [level-designer, narrative-designer, tech-artist, game-designer]
  - name: playtest-is-evidence
    description: "Le fun et la jouabilité se prouvent, ne se déclarent pas."
    rule: "Atteignabilité, soft-locks et courbe de difficulté sont vérifiés par playtest (agentique ou humain) et tracés dans un Playtest Evidence Pack. (UC-11)"
    agents_affected: [game-qa, level-designer]
  - name: certification-proof-gate
    description: "La certification est une gate de preuve."
    rule: "Pas de date de soumission sans cert dry-run vert, build reproductible tagué et evidence pack. Aucun contenu hors classification d'âge déclarée. (GR-02, GR-04, GR-08, UC-15, UC-47)"
    agents_affected: [game-qa, liveops-analyst]
  - name: telemetry-driven-liveops
    description: "Pas d'ajustement live à l'aveugle."
    rule: "Toute décision live (patch, saison, économie) est sourcée par la télémétrie, déployée en canary et accompagnée d'un plan de rollback ou de compensation. (GR-05, GR-09, UC-16)"
    agents_affected: [liveops-analyst, systems-economist]
  - name: capability-modality-routing
    description: "Router hors du cœur LLM plutôt que simuler la maîtrise."
    rule: "Pour une tâche hors cœur de compétence d'un LLM texte (illustration, audio, modélisation 3D, vidéo), router vers la cible capable (modèle spécialisé, outil/DCC, humain) et produire un Capability Routing Record. Ne jamais livrer comme final un asset produit hors maîtrise. (MOD-03, GOV-15, RUN-15)"
    agents_affected: [tech-artist, narrative-designer, "*"]
  - name: evidence-gated-delivery
    description: "La preuve fait partie du livrable."
    rule: "Avant de déclarer un jalon ou une tâche jeu terminée, produire ou mettre à jour la preuve attendue (record/evidence pack) et documenter les gates non applicables avec justification."
    agents_affected: "*"

constraints:
  - id: gdd-required
    description: "Un GDD versionné doit exister avant toute génération de contenu durable."
    enforcement: hard
    checked_by: game-designer
  - id: content-validation-before-merge
    description: "Aucun contenu intégré sans Content Validation Record."
    enforcement: hard
    checked_by: game-qa
  - id: determinism-for-tested-sim
    description: "Toute simulation testée doit être déterministe (seed + pas fixe + hash)."
    enforcement: hard
    checked_by: gameplay-programmer
  - id: balance-regression-required
    description: "Aucun changement d'équilibrage sans preuve de non-régression."
    enforcement: hard
    checked_by: systems-economist
  - id: cert-proof-before-submission
    description: "Pas de soumission plateforme sans cert dry-run vert et evidence pack."
    enforcement: hard
    checked_by: game-qa
  - id: route-out-of-core-modality
    description: "Un asset hors cœur LLM (image/audio/3D/vidéo) n'est pas livré comme final sans routage déclaré."
    enforcement: soft
    checked_by: tech-artist

values:
  - name: fun-is-provable
    description: "La jouabilité et le fun sont des critères de livraison prouvés, pas des opinions."
    priority: 1
  - name: determinism-and-reproducibility
    description: "Un bug qui ne se reproduit pas n'est pas corrigé ; un jalon non prouvé n'est pas atteint."
    priority: 1
  - name: player-trust
    description: "Équité, sécurité et respect du joueur priment sur l'optimisation court terme de l'économie."
    priority: 2
  - name: assumed-limits
    description: "Mieux vaut router et assumer une limite que produire un livrable médiocre hors maîtrise."
    priority: 3

tools_required:
  - name: git
    description: "Traçabilité des changements et build reproductible."
    required: true
    check_command: "which git"
  - name: game-dev-domain-map
    description: "Carte domaine reliant règles, use-cases, rayons, genres et modalités."
    required: true
    check_command: "test -f framework/game-dev/domain-map.yaml"
  - name: gdd-template
    description: "Template de Game Design Document gouverné."
    required: true
    check_command: "test -f framework/game-dev/templates/gdd.md"
  - name: python3
    description: "Scripts de simulation, validation et preuves."
    required: false
    check_command: "which python3"
  - name: game-engine
    description: "Moteur de jeu (Godot, Unity, Unreal) pour build et simulation déterministe."
    required: false
    check_command: "which godot || which unity-editor || true"

acceptance_criteria:
  - id: gdd-present
    description: "Le projet a un GDD versionné comme source de vérité."
    enforcement: hard
    context: "Template framework/game-dev/templates/gdd.md"
    triggers_on: ["docs/GDD.md", "**/GDD.md"]
    checked_by: game-designer
  - id: determinism-record-present
    description: "Les simulations testées ont une preuve de rejouabilité."
    enforcement: soft
    context: "Template framework/game-dev/templates/determinism-replay-record.md"
    triggers_on: ["_grimoire-output/evidence/**/determinism-replay-record.md"]
    checked_by: gameplay-programmer
  - id: balance-evidence-present
    description: "Les changements d'équilibrage ont une preuve de non-régression."
    enforcement: soft
    context: "Template framework/game-dev/templates/balance-regression-evidence.md"
    triggers_on: ["_grimoire-output/evidence/**/balance-regression-evidence.md"]
    checked_by: systems-economist

mcp_servers:
  - name: blender-mcp
    description: "Modélisation 3D via Blender (routage modalité 3D — MOD-03)."
    required_by: [tech-artist]
    required: false
  - name: godot-mcp
    description: "Pilotage du moteur Godot (build, import, simulation headless)."
    required_by: [gameplay-programmer, game-qa]
    required: false

team_manifest:
  name: "Game Studio"
  agents:
    - tag: game-designer
      role: "Gardien du GDD, décomposeur d'objectifs en mécaniques et boucles vérifiables"
      scope: "GDD, systèmes, mécaniques, claims de design, arbitrage du canon"
    - tag: narrative-designer
      role: "Cohérence du lore et narration interactive ancrée sur le canon"
      scope: "Bible, arcs narratifs, dialogues, états narratifs"
    - tag: level-designer
      role: "Plan, blockout et validation de niveaux contre les objectifs de design"
      scope: "Niveaux, zones, rythme, atteignabilité"
    - tag: gameplay-programmer
      role: "Comportements de jeu (IA, combat, physique) + harnais déterministe"
      scope: "Code gameplay, behavior trees/FSM, simulation rejouable, systèmes"
    - tag: systems-economist
      role: "Simulation d'équilibrage et d'économie avec non-régression"
      scope: "Balance, économie, maths de gameplay, télémétrie d'équilibrage"
    - tag: tech-artist
      role: "Pipeline d'assets gouverné, budgets, rendu, routage de modalité"
      scope: "Assets 3D/2D, shaders, VFX, budgets perf, routage MOD-03"
    - tag: game-qa
      role: "Playtest agentique et préparation à la certification"
      scope: "Playtests, soft-locks, tests automatisés, checklists cert/rating"
    - tag: liveops-analyst
      role: "Analyse de télémétrie et pilotage de déploiement (canary, rollback)"
      scope: "Live ops, télémétrie, saisons, patchs, expérimentation"
  communication_protocol:
    - "[game-designer→narrative-designer] : canon de lore, contraintes narratives"
    - "[game-designer→gameplay-programmer] : spec de mécaniques à implémenter"
    - "[game-designer→systems-economist] : intentions d'équilibrage à simuler"
    - "[level-designer→game-qa] : niveaux à playtester (atteignabilité, soft-locks)"
    - "[gameplay-programmer→game-qa] : harnais déterministe pour replays et tests"
    - "[systems-economist→liveops-analyst] : modèle d'économie pour la télémétrie live"
    - "[tech-artist→*] : routage de modalité (MOD-03) et budgets d'assets"
    - "[game-qa→liveops-analyst] : cert/rating prêts pour la soumission"
    - "[*→game-designer] : remontée de dérive GDD/build pour arbitrage"
