$schema: "grimoire-archetype-dna/v1"

id: web-app
name: "Web App"
version: "1.0.0"
description: "Applications web full-stack — Frontend, API, base de données, CI/CD"
icon: "🌐"
author: "grimoire-kit"
tags: [web, frontend, backend, api, fullstack, react, nextjs, typescript, python, go]

inherits: minimal

traits:
  - name: tdd-mandatory
    description: "Test-Driven Development obligatoire"
    rule: "Tests AVANT le code. Pour toute feature : 1) écrire le test qui échoue, 2) écrire le code minimal pour le faire passer, 3) refactorer. CC PASS = build + tests OK."
    agents_affected: [frontend-specialist, fullstack-dev, pixel, gopher, serpent]
  - name: type-safety
    description: "Typage strict partout"
    rule: "TypeScript strict: true. Python avec type hints obligatoires + mypy. Go avec interfaces explicites. Zéro any/interface{} sans explication."
    agents_affected: [pixel, gopher, serpent, frontend-specialist, fullstack-dev]
  - name: api-contract-first
    description: "Contrat API défini avant implémentation"
    rule: "Toute nouvelle API route → définir l'interface/type/schema OpenAPI en premier. Frontend et backend s'accordent sur le contrat avant d'implémenter."
    agents_affected: "*"
  - name: accessibility-aware
    description: "Accessibilité WCAG 2.1 AA minimum"
    rule: "Zéro composant UI sans aria-labels. Contraste ≥ 4.5:1. Navigation clavier fonctionnelle."
    agents_affected: [frontend-specialist, pixel]
  - name: tool-resolve-first
    description: "Résolution d'outils avant toute opération externe"
    rule: "Avant toute opération nécessitant un outil externe (linter, test runner, build, browser), appeler grimoire_tool_resolve pour vérifier disponibilité et alternatives."
    agents_affected: "*"
  - name: web-aware
    description: "Accès web intuitif pour vérification et debug"
    rule: "Les agents peuvent naviguer le web via grimoire_web_fetch / grimoire_web_screenshot / grimoire_web_readability pour checker des endpoints, vérifier l'UI ou consulter des docs. Toujours disponible via urllib fallback."
    agents_affected: [frontend-specialist, fullstack-dev]

constraints:
  - id: no-console-log-in-prod
    description: "Zéro console.log/print en production"
    enforcement: soft
    checked_by: agent-optimizer
  - id: cc-web-pass
    description: "cc-verify.sh --stack web obligatoire avant livraison"
    enforcement: hard
    checked_by: agent-optimizer
  - id: no-inline-styles
    description: "Pas de styles inline si un design system est présent"
    enforcement: soft
    checked_by: frontend-specialist

values:
  - name: user-experience-first
    description: "L'UX prime sur l'élégance technique"
    priority: 1
  - name: performance-budget
    description: "Core Web Vitals : LCP < 2.5s, CLS < 0.1, FID < 100ms"
    priority: 2
  - name: progressive-enhancement
    description: "L'app fonctionne sans JS, enrichie avec JS"
    priority: 3

tools_required:
  - name: node
    description: "Node.js pour le build frontend et les tests Jest"
    required: true
    check_command: "which node"
  - name: docker
    description: "Conteneurisation du backend et de la base de données"
    required: false
    check_command: "which docker"
  - name: browser
    description: "Navigateur headless pour les tests E2E (Playwright/Cypress)"
    required: false
    check_command: "which chromium || which google-chrome || which chromium-browser"
  - name: tool-resolver
    description: "Résolution et provisionnement d'outils (framework/tools/tool-resolver.py)"
    required: true
    check_command: "python3 framework/tools/tool-resolver.py --version"
  - name: web-browser
    description: "Navigation web sandboxée (framework/tools/web-browser.py)"
    required: false
    check_command: "python3 framework/tools/web-browser.py --version"

acceptance_criteria:
  - id: tests-written-before-code
    description: "Les tests doivent exister AVANT l'implémentation (TDD red phase)"
    enforcement: hard
    context: "Trait tdd-mandatory — cycle Red/Green/Refactor"
    triggers_on: ["src/**/*.ts", "src/**/*.tsx", "**/*.py", "**/*.go"]
    checked_by: frontend-specialist
  - id: typescript-strict-no-any
    description: "Aucun \"any\" explicite dans le code TypeScript soumis"
    enforcement: hard
    context: "Trait type-safety — strict: true obligatoire"
    triggers_on: ["**/*.ts", "**/*.tsx"]
    checked_by: frontend-specialist
  - id: api-schema-before-impl
    description: "Le schéma OpenAPI ou le type d'interface est défini avant le code API"
    enforcement: soft
    context: "Trait api-contract-first"
    triggers_on: ["src/api/**/*", "pages/api/**/*"]
    checked_by: fullstack-dev
  - id: aria-labels-on-interactive
    description: "Tous les boutons, liens et inputs ont un aria-label ou texte visible"
    enforcement: soft
    context: "Trait accessibility-aware — WCAG 2.1 AA"
    triggers_on: ["**/*.tsx", "**/*.vue", "**/*.svelte"]
    checked_by: pixel

agents:
  - path: "../../archetypes/web-app/agents/frontend-specialist.md"
    required: true
    description: "Frontend Specialist — React, Vue, Next.js, UX"
  - path: "../../archetypes/web-app/agents/fullstack-dev.md"
    required: true
    description: "Fullstack Dev — API, base de données, auth"

workflows: []
shared_context_template: "../../archetypes/web-app/shared-context.tpl.md"
prompts_directory: "../../.github/prompts/team-build"

compatible_with: [minimal, fix-loop, features/vector-memory, stack/typescript, stack/python, stack/go, stack/docker]
incompatible_with: [infra-ops]
requires: []

auto_detect:
  files: ["package.json", "next.config.*", "vite.config.*", "nuxt.config.*"]
  directories: ["src/", "pages/", "app/", "components/"]
  confidence_boost: 80
  exclusive: true

changelog:
  - version: "1.0.0"
    date: "2026-02-27"
    changes:
      - "DNA initiale — traits TDD, type-safety, API-contract-first, accessibility"
