<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extensions — Grimoire Kit</title>
  <link rel="stylesheet" href="forge-tokens.css" />
  <link rel="stylesheet" href="forge-base.css" />
  <link rel="stylesheet" href="atelier.css" />
  <script src="grimoire-mode.js"></script>
  <style>
    .ex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 1000px) { .ex-grid { grid-template-columns: 1fr; } }
    .ex-card h3 { font-size: 0.92rem; }
    .ex-card p { font-size: 0.74rem; color: var(--ink-soft); line-height: 1.55; margin: 6px 0 12px; }
    .ex-card.study { border-style: dashed; }
    .ex-card.study h3 { color: var(--ink-soft); }
    .ex-card.start { background: var(--elev-2); }
    .ex-proc { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ex-proc .at-chip { font-size: 0.56rem; }
    .ex-proc .a { color: var(--ink-muted); font-family: var(--font-mono); }
  </style>
</head>
<body class="at-body">
  <nav id="forge-nav" aria-label="Navigation principale"></nav>
  <div class="at-app">
    <aside class="at-side" id="atelier-side"></aside>
    <div class="at-main">
      <div class="at-scroll"><div class="at-page">
        <div class="at-row sb" style="align-items:flex-start;margin-bottom:4px">
          <div>
            <div class="at-h1-row" style="margin-bottom:4px"><h1 class="at-h1">Extensions</h1><span class="at-sub">marketplace gouverné</span></div>
            <p class="at-lead">Chaque extension packe un framework public en artefacts gouvernés, ancrés sur des patterns du standard. Manifeste validé, hooks en shadow, réversible.</p>
          </div>
          <input class="at-search" id="ex-search" placeholder="rechercher…" style="max-width:240px" />
        </div>
        <div class="at-row" style="gap:8px;margin:16px 0 20px;flex-wrap:wrap" id="ex-segs"></div>
        <div class="ex-grid" id="ex-grid"></div>
      </div></div>
      <div class="at-status" id="atelier-status"></div>
    </div>
  </div>

  <footer id="forge-footer"></footer>

  <!-- Fiche extension (drawer) -->
  <div class="bp-fiche" id="ex-fiche"></div>

  <script src="atelier-nav.js"></script>
  <script src="forge-nav.js"></script>
  <script>
  (async function () {
    'use strict';
    const $ = (s, r) => (r || document).querySelector(s);
    const esc = Atelier.esc;
    const { catalogue: CAT, extensions: EXT } = await Atelier.data();
    const IN_ATELIER = window.GrimoireMode === 'atelier';

    let seg = 'all';
    let q = '';

    const statusOf = e => e.status === 'study' ? 'study' : (IN_ATELIER && Atelier.installedExts().includes(e.id) ? 'installed' : 'available');

    function patternChips(refs) {
      return (refs || []).map(r => {
        const p = Atelier.byRef[r];
        return `<a class="at-chip" style="font-size:0.56rem;text-decoration:none" href="patterns.html#${esc(r)}" title="${esc(p ? p.name : '')}">
          <span class="cdot" style="background:${Atelier.catColor(r.slice(0, 3))}"></span>${esc(r)}</a>`;
      }).join('');
    }

    function segs() {
      const insts = EXT.extensions.filter(e => statusOf(e) === 'installed').length;
      const disp  = EXT.extensions.filter(e => statusOf(e) === 'available').length;
      const study = EXT.extensions.filter(e => e.status === 'study').length;
      const mk = (id, label, n, extra) => `<button class="at-chip ${seg === id ? 'on' : ''}" data-seg="${id}" ${extra || ''}>${label} · ${n}</button>`;
      $('#ex-segs').innerHTML =
        mk('all', 'TOUTES', EXT.extensions.length) +
        (IN_ATELIER ? mk('installed', 'INSTALLÉES', insts) : '') +
        mk('available', 'DISPONIBLES', disp) +
        mk('study', 'À L\u2019ÉTUDE', study) +
        `<span style="width:10px"></span>` +
        mk('starts', 'POINTS DE DÉPART', (EXT.published_blueprints || []).length, 'style="border-style:dashed"');
      document.querySelectorAll('#ex-segs .at-chip').forEach(b =>
        b.addEventListener('click', () => { seg = b.dataset.seg; render(); }));
    }

    function card(e) {
      const st = statusOf(e);
      const tag = st === 'installed'
        ? `<span class="at-status-tag inst">installée ✓ v${esc(e.version)}</span>`
        : st === 'study'
          ? `<span class="at-status-tag etude">à l'étude</span>`
          : `<span class="at-status-tag disp">disponible</span>`;
      const action = st === 'installed'
        ? `<button class="at-btn sm ghost" data-open="${e.id}">GÉRER →</button>`
        : st === 'study'
          ? `<a class="at-btn sm ghost" href="${esc(e.upstream)}" target="_blank" rel="noopener">UPSTREAM ↗</a>`
          : IN_ATELIER
            ? `<button class="at-btn sm" data-install="${e.id}">INSTALLER</button>`
            : `<button class="at-btn sm ghost" data-open="${e.id}">FICHE →</button>`;
      return `<div class="at-card ex-card ${st === 'study' ? 'study' : ''}" data-open-card="${e.id}">
        <div class="at-row sb"><h3>${esc(e.name)}</h3>${tag}</div>
        <p>${esc(e.desc)}</p>
        <div class="at-row sb">
          <div class="at-row" style="gap:5px;flex-wrap:wrap">${patternChips(e.patterns)}
            ${(e.hooks || []).some(h => h.mode === 'shadow') ? '<span class="at-chip acc" style="font-size:0.54rem">hooks · shadow</span>' : ''}
          </div>
          ${action}
        </div>
      </div>`;
    }

    function startCard(b) {
      const needs = (b.requires || []).filter(id => !Atelier.installedExts().includes(id));
      return `<div class="at-card ex-card start">
        <div class="at-row sb"><h3>${esc(b.name)}</h3><span class="at-chip" style="font-size:0.54rem">point de départ</span></div>
        <p>${esc(b.desc)}</p>
        <div class="at-row sb">
          <span style="font-family:var(--font-mono);font-size:0.58rem;color:var(--ink-muted)">${!IN_ATELIER ? 'nécessite l\u2019atelier local' : needs.length ? 'installera : ' + needs.join(', ') : 's\u2019ouvre dans l\u2019éditeur'}</span>
          ${IN_ATELIER
            ? `<a class="at-btn sm acc" href="blueprints.html?bp=${esc(b.id)}">OUVRIR DANS L'ÉDITEUR →</a>`
            : `<a class="at-btn sm acc js-launch-atelier" href="#">DANS L'ATELIER →</a>`}
        </div>
      </div>`;
    }

    function render() {
      segs();
      let items = EXT.extensions.filter(e => {
        if (seg === 'starts') return false;
        if (seg !== 'all' && statusOf(e) !== seg) return false;
        if (q) {
          const s = q.toLowerCase();
          if (!(e.name.toLowerCase().includes(s) || e.desc.toLowerCase().includes(s) || (e.patterns || []).some(p => p.toLowerCase().includes(s)))) return false;
        }
        return true;
      });
      let html = items.map(card).join('');
      if (seg === 'all' || seg === 'starts') html += (EXT.published_blueprints || []).map(startCard).join('');
      $('#ex-grid').innerHTML = html || '<p class="at-sub" style="padding:30px 0">rien ici.</p>';

      document.querySelectorAll('[data-install]').forEach(b => b.addEventListener('click', ev => { ev.stopPropagation(); install(b.dataset.install); }));
      document.querySelectorAll('[data-open]').forEach(b => b.addEventListener('click', ev => { ev.stopPropagation(); openFiche(b.dataset.open); }));
      document.querySelectorAll('[data-open-card]').forEach(c => c.addEventListener('click', () => openFiche(c.dataset.openCard)));
    }

    /* ── Installation : la procédure est montrée, étape par étape ── */
    function install(id, after) {
      const e = Atelier.extById[id];
      const steps = ['manifeste validé (schéma) ✓', 'artefacts copiés dans le projet ✓',
        (e.hooks || []).length ? 'hooks enregistrés en shadow ✓' : 'aucun hook à enregistrer ✓',
        'installée · réversible'];
      let i = 0;
      const tick = () => {
        Atelier.toast('<b>' + esc(e.name) + '</b> — ' + steps.slice(0, i + 1).join(' · '), { good: i === steps.length - 1, ms: 1800 });
        i++;
        if (i < steps.length) setTimeout(tick, 550);
        else { Atelier.installExt(id); render(); if (after) after(); }
      };
      tick();
    }

    /* ── Fiche ── */
    function openFiche(id) {
      const e = Atelier.extById[id];
      if (!e || e.status === 'study') return;
      const st = statusOf(e);
      const f = $('#ex-fiche');
      f.innerHTML = `
        <div class="f-head">
          <div class="at-row sb">
            <div class="at-row" style="gap:10px">
              <h2 style="font-size:1.05rem">${esc(e.name)}</h2>
              <span class="at-chip" style="font-size:0.56rem">${esc(e.kind)}</span>
            </div>
            <button class="at-btn sm ghost" id="ex-close">✕</button>
          </div>
          <div class="at-row sb" style="margin-top:8px">
            <span class="at-sub">v${esc(e.version)} · ${esc(e.license)} · <a href="${esc(e.upstream)}" target="_blank" rel="noopener" style="color:var(--ink-soft)">upstream ↗</a></span>
            ${st === 'installed' ? '<span class="at-status-tag inst">installée ✓ · à jour</span>' : '<span class="at-status-tag disp">disponible</span>'}
          </div>
        </div>
        <div class="f-body">
          <p style="font-size:0.78rem;color:var(--ink-soft);line-height:1.6">${esc(e.desc)}</p>
          <div>
            <div class="at-lbl" style="margin-bottom:6px">Patterns implémentés — l'ancrage au standard</div>
            <div class="at-row" style="gap:5px;flex-wrap:wrap">${patternChips(e.patterns)}</div>
            <p style="font-family:var(--font-mono);font-size:0.56rem;color:var(--ink-muted);margin-top:6px">une extension sans ancrage est refusée du registry</p>
          </div>
          <div>
            <div class="at-lbl" style="margin-bottom:6px">Artefacts installés dans le projet</div>
            <p style="font-family:var(--font-mono);font-size:0.7rem;color:var(--ink-soft)">${Object.entries(e.artifacts || {}).map(([k, v]) => k + ' ' + v).join(' · ') || '—'}</p>
            ${(e.hooks || []).map(h => `<div class="at-row sb" style="margin-top:8px;border:1px solid var(--line);border-radius:4px;padding:8px 10px">
              <span style="font-size:0.7rem;color:var(--ink-soft)">hook · ${esc(h.event)} — ${esc(h.desc)}</span>
              <span class="at-chip acc" style="font-size:0.52rem">${esc(h.mode)} · promotion = votre décision</span></div>`).join('')}
          </div>
          ${(e.provides_nodes || []).length ? `<div>
            <div class="at-lbl" style="margin-bottom:6px">Nodes fournis à l'éditeur</div>
            ${e.provides_nodes.map(n => `<div class="at-row sb" style="border:1px solid var(--line);border-radius:4px;padding:8px 10px">
              <span style="font-size:0.72rem"><b style="font-family:var(--font-mono);font-size:0.66rem">${esc(n.name)}</b> — ${esc(n.desc)}</span>
              ${IN_ATELIER ? `<a class="at-btn sm" href="blueprints.html?add=${esc(n.id)}">UTILISER →</a>` : `<span class="at-sub">via l'éditeur de l'atelier</span>`}</div>`).join('')}
          </div>` : ''}
          <div>
            <div class="at-lbl" style="margin-bottom:6px">Permissions déclarées</div>
            <table class="at-table">${(e.permissions || []).map(p => `<tr><td>${esc(p.scope)}</td><td>${esc(p.why)}</td></tr>`).join('')}</table>
          </div>
          <div>
            <div class="at-lbl" style="margin-bottom:8px">Installation — ce qui se passe, dans l'ordre</div>
            <div class="ex-proc">
              <span class="at-chip">manifeste validé</span><span class="a">→</span>
              <span class="at-chip">artefacts copiés</span><span class="a">→</span>
              <span class="at-chip">hooks en shadow</span><span class="a">→</span>
              <span class="at-chip" style="border-color:rgba(52,211,153,.4);color:var(--data-green)">installée ✓ · réversible</span>
            </div>
          </div>
          ${IN_ATELIER ? `<div>
            <div class="at-lbl" style="margin-bottom:6px">En vitrine (site public)</div>
            <div style="padding:8px 12px;background:var(--elev-2);border:1px solid var(--line);border-radius:4px;font-family:var(--font-mono);font-size:0.64rem;color:var(--ink-soft)">$ ${esc(e.install_cmd)}</div>
            <p style="font-family:var(--font-mono);font-size:0.56rem;color:var(--ink-muted);margin-top:5px">même fiche, le bouton devient la commande</p>
          </div>` : ''}
        </div>
        <div class="f-foot">
          ${st === 'installed'
            ? `<button class="at-btn" id="ex-remove">RETIRER — réversible</button><span class="at-sp"></span><span class="at-status-tag inst" style="align-self:center">à jour ✓</span>`
            : IN_ATELIER
              ? `<button class="at-btn pri" id="ex-do-install" style="flex:1">INSTALLER — 1 CLIC</button>`
              : `<div style="flex:1;display:flex;flex-direction:column;gap:7px"><div style="padding:8px 12px;background:var(--elev-2);border:1px solid var(--line);border-radius:4px;font-family:var(--font-mono);font-size:0.64rem;color:var(--ink)">$ ${esc(e.install_cmd)}</div><span class="at-sub">installation en 1 clic dans l'atelier — <a href="#" class="js-launch-atelier" style="color:var(--accent)">lancer →</a></span></div>`}
        </div>`;
      f.classList.add('open');
      $('#ex-close').addEventListener('click', closeFiche);
      const rm = $('#ex-remove');
      if (rm) rm.addEventListener('click', () => {
        Atelier.removeExt(e.id);
        Atelier.toast('<b>' + esc(e.name) + '</b> retirée — artefacts nettoyés, hooks désinscrits.');
        closeFiche(); render();
      });
      const di = $('#ex-do-install');
      if (di) di.addEventListener('click', () => { closeFiche(); install(e.id); });
    }
    function closeFiche() { $('#ex-fiche').classList.remove('open'); }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFiche(); });

    $('#ex-search').addEventListener('input', e => { q = e.target.value.trim(); render(); });

    render();
    const deepLink = new URLSearchParams(location.search).get('ext');
    if (deepLink) openFiche(deepLink);
  })();
  </script>
</body>
</html>
