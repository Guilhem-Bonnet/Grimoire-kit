<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Setup — Grimoire Forge</title>
  <meta name="description" content="Setup local Grimoire Forge : wizard d'initialisation par archetypes, état des artefacts gouvernés du projet, gestion des extensions. Nécessite grimoire serve." />
  <link rel="stylesheet" href="forge-tokens.css"/>
  <link rel="stylesheet" href="forge-base.css"/>
  <link rel="stylesheet" href="forge-motion.css"/>
  <style>
    body { padding-top: 56px; }
    .su-topbar { position: sticky; top: 56px; z-index: 800; height: 48px; display: flex; align-items: center; gap: 14px; padding: 0 24px; background: var(--elev-1); border-bottom: 1px solid var(--line); }
    .su-title { font-family: var(--font-mono); font-size: .68rem; letter-spacing: .14em; color: var(--ink); font-weight: 600; }
    .su-mode { font-family: var(--font-mono); font-size: .6rem; color: var(--ink-muted); margin-left: auto; }
    .su-mode .on { color: var(--data-green); }
    .su-body { max-width: 1240px; margin: 0 auto; padding: 28px 24px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .su-panel { background: var(--elev-1); border: 1px solid var(--line); border-radius: var(--r-md); padding: 20px; }
    .su-panel.wide { grid-column: 1 / -1; }
    .su-lbl { font-family: var(--font-mono); font-size: .62rem; letter-spacing: .14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .su-lbl::after { content: ''; flex: 1; height: 1px; background: var(--line); }
    .su-offline { grid-column: 1 / -1; text-align: center; padding: 60px 20px; color: var(--ink-soft); }
    .su-offline code { display: inline-block; margin-top: 14px; background: var(--elev-1); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px 16px; font-family: var(--font-mono); font-size: .78rem; color: var(--ink); }
    .su-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .su-row label { font-family: var(--font-mono); font-size: .6rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-muted); }
    .su-row input, .su-row select { background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm); color: var(--ink); font-family: var(--font-mono); font-size: .74rem; padding: 9px 11px; }
    .su-row input:focus, .su-row select:focus { outline: none; border-color: var(--accent-dim); }
    .su-arch { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .su-arch label { display: block; background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px 12px; cursor: pointer; }
    .su-arch label:has(input:checked) { border-color: var(--accent); }
    .su-arch input { display: none; }
    .su-arch .an { font-family: var(--font-mono); font-size: .68rem; color: var(--ink); }
    .su-arch .ad { font-size: .68rem; color: var(--ink-muted); line-height: 1.4; margin-top: 3px; }
    .su-check { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: .66rem; color: var(--ink-soft); padding: 5px 0; cursor: pointer; }
    .su-check input { accent-color: var(--accent); }
    .su-btn { background: var(--accent-soft); border: 1px solid var(--accent-dim); border-radius: var(--r-sm); color: var(--accent); font-family: var(--font-mono); font-size: .66rem; letter-spacing: .08em; text-transform: uppercase; padding: 10px 18px; cursor: pointer; transition: background var(--dur-fast); }
    .su-btn:hover { background: var(--accent-dim); }
    .su-btn.ghost { background: none; border-color: var(--line); color: var(--ink-muted); padding: 5px 10px; font-size: .58rem; }
    .su-btn.ghost:hover { color: var(--data-red); border-color: rgba(248,113,113,.4); }
    .su-out { margin-top: 14px; font-family: var(--font-mono); font-size: .64rem; color: var(--ink-soft); background: var(--bg); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px; white-space: pre-wrap; word-break: break-all; display: none; }
    .su-out.show { display: block; }
    .su-tree { font-family: var(--font-mono); font-size: .66rem; line-height: 1.7; }
    .su-tree .k { color: var(--accent); text-transform: uppercase; font-size: .58rem; letter-spacing: .1em; display: block; margin-top: 10px; }
    .su-tree .k:first-child { margin-top: 0; }
    .su-tree .f { color: var(--ink-soft); display: block; padding-left: 14px; }
    .su-tree .empty { color: var(--ink-muted); padding-left: 14px; }
    .su-ext { display: flex; align-items: baseline; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--line); font-family: var(--font-mono); font-size: .68rem; }
    .su-ext:last-child { border-bottom: none; }
    .su-ext .v { color: var(--ink-muted); font-size: .6rem; }
    .su-ext .pat { color: var(--data-cyan); font-size: .6rem; }
    .su-ext .sp { flex: 1; }
  </style>
</head>
<body>
<a href="#main" class="skip-link">Aller au contenu</a>
<nav id="forge-nav" aria-label="Navigation principale"></nav>

<main id="main">
<div class="su-topbar">
  <span class="su-title">SETUP · MODE LOCAL</span>
  <span class="su-mode" id="su-mode">détection du serveur…</span>
</div>

<div class="su-body" id="su-body">
  <div class="su-offline" id="su-offline">
    <p>Cette page pilote un projet local : wizard d'initialisation, artefacts gouvernés, extensions.<br/>Elle nécessite le serveur local.</p>
    <code>grimoire serve</code>
  </div>
</div>
</main>

<template id="su-panels">
  <section class="su-panel">
    <div class="su-lbl">WIZARD D'INITIALISATION</div>
    <div class="su-row"><label for="su-name">Nom du projet</label><input id="su-name" type="text" placeholder="mon-projet"/></div>
    <div class="su-row"><label for="su-user">Utilisateur</label><input id="su-user" type="text" placeholder="Alice"/></div>
    <div class="su-row"><label>Archetype</label><div class="su-arch" id="su-archetypes"></div></div>
    <div class="su-row"><label>Extensions à installer</label><div id="su-ext-choices"></div></div>
    <button type="button" class="su-btn" id="su-plan">GÉNÉRER LE PLAN + INSTALLER LES EXTENSIONS</button>
    <div class="su-out" id="su-plan-out"></div>
  </section>

  <section class="su-panel">
    <div class="su-lbl">EXTENSIONS INSTALLÉES</div>
    <div id="su-installed"></div>
  </section>

  <section class="su-panel wide">
    <div class="su-lbl">MON SETUP — ARTEFACTS GOUVERNÉS</div>
    <div class="su-tree" id="su-artifacts"></div>
  </section>
</template>

<script src="forge-nav.js"></script>
<script>
(function () {
  'use strict';
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const api = (path, opts) => fetch(path, opts).then(r => r.json());

  function refreshSetup() {
    api('/api/setup').then(view => {
      const tree = document.getElementById('su-artifacts');
      tree.innerHTML = Object.entries(view.artifacts).map(([kind, files]) =>
        `<span class="k">${esc(kind)} · ${files.length}</span>` +
        (files.length ? files.map(f => `<span class="f">${esc(f)}</span>`).join('')
                      : '<span class="empty">aucun</span>')
      ).join('');
    });
    api('/api/extensions').then(view => {
      const box = document.getElementById('su-installed');
      const entries = Object.entries(view.installed);
      box.innerHTML = entries.length ? entries.map(([id, e]) =>
        `<div class="su-ext"><span>${esc(id)}</span><span class="v">v${esc(e.version)}</span>
         <span class="pat">${(e.patterns || []).map(esc).join(' ')}</span><span class="sp"></span>
         <button type="button" class="su-btn ghost" data-remove="${esc(id)}">RETIRER</button></div>`
      ).join('') : '<div class="su-ext"><span class="v">Aucune extension installée.</span></div>';
      box.querySelectorAll('[data-remove]').forEach(btn => btn.addEventListener('click', () => {
        api('/api/extensions/remove', { method: 'POST', body: JSON.stringify({ id: btn.dataset.remove }) })
          .then(refreshSetup);
      }));
      const choices = document.getElementById('su-ext-choices');
      choices.innerHTML = view.available.map(e =>
        `<label class="su-check"><input type="checkbox" value="${esc(e.id)}" ${view.installed[e.id] ? 'checked disabled' : ''}/>
         ${esc(e.name)} <span class="v">v${esc(e.version)}</span></label>`).join('')
        || '<span class="v">Aucune extension packagée dans le kit.</span>';
    });
  }

  api('/api/status').then(status => {
    document.getElementById('su-mode').innerHTML =
      `<span class="on">CONNECTÉ</span> · kit v${esc(status.kitVersion)} · ${esc(status.projectRoot)}`;
    const body = document.getElementById('su-body');
    document.getElementById('su-offline').remove();
    body.appendChild(document.getElementById('su-panels').content.cloneNode(true));

    api('/api/archetypes').then(archetypes => {
      document.getElementById('su-archetypes').innerHTML = archetypes.map((a, i) =>
        `<label><input type="radio" name="su-arch" value="${esc(a.id)}" ${i === 0 ? 'checked' : ''}/>
         <span class="an">${esc(a.name)}</span><span class="ad">${esc(a.description)}</span></label>`).join('');
    });
    refreshSetup();

    document.getElementById('su-body').addEventListener('click', e => {
      if (e.target.id !== 'su-plan') return;
      const payload = {
        name: document.getElementById('su-name').value,
        user: document.getElementById('su-user').value,
        archetype: (document.querySelector('[name=su-arch]:checked') || {}).value || 'minimal',
        extensions: [...document.querySelectorAll('#su-ext-choices input:checked:not(:disabled)')].map(i => i.value),
      };
      api('/api/setup/plan', { method: 'POST', body: JSON.stringify(payload) }).then(plan => {
        const out = document.getElementById('su-plan-out');
        out.classList.add('show');
        out.textContent =
          'Plan écrit dans _grimoire/setup-plan.json\n' +
          'Extensions installées : ' + (plan.extensionsInstalled.join(', ') || 'aucune') + '\n' +
          (plan.extensionErrors.length ? 'Erreurs : ' + plan.extensionErrors.join(' | ') + '\n' : '') +
          'Commande d’init à lancer :\n' + plan.initCommand;
        refreshSetup();
      });
    });
  }).catch(() => {
    document.getElementById('su-mode').textContent = 'HORS LIGNE — grimoire serve requis';
  });
})();
</script>
</body>
</html>
