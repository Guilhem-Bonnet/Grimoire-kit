<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier — Grimoire Kit</title>
  <link rel="stylesheet" href="forge-tokens.css" />
  <link rel="stylesheet" href="forge-base.css" />
  <link rel="stylesheet" href="atelier.css" />
  <script src="grimoire-mode.js"></script>
</head>
<body class="at-body">
  <div class="at-app">
    <aside class="at-side" id="atelier-side"></aside>
    <div class="at-main">
      <div class="at-scroll"><div class="at-page" id="page"></div></div>
      <div class="at-status" id="atelier-status"></div>
    </div>
  </div>

  <script src="atelier-nav.js"></script>
  <script>
  (async function () {
    'use strict';
    const $ = (s, r) => (r || document).querySelector(s);
    const esc = Atelier.esc;
    await Atelier.data();

    const PROFILES = [
      { id: 'starter',      desc: 'le minimum gouverné — Completion Contract seul' },
      { id: 'controlled',   desc: 'starter + gates de preuve et scans sur chaque done', reco: true },
      { id: 'orchestrated', desc: 'controlled + fan-out multi-agents budgété' },
      { id: 'governed',     desc: 'orchestrated + threat model et détection de contradictions' },
      { id: 'production',   desc: 'governed + audit antifragile continu, CI gated' }
    ];

    function render() {
      const proj = Atelier.project();
      $('#page').innerHTML = proj ? hubView(proj) : firstLaunchView();
      bind(proj);
      Atelier.refreshChrome();
    }

    /* ═══ PREMIER LANCEMENT ═══ */
    function firstLaunchView() {
      return `
      <div style="max-width:860px;margin:0 auto;padding-top:8vh">
        <div class="at-row" style="gap:8px;margin-bottom:26px;flex-wrap:wrap">
          <span class="at-chip"><span style="color:var(--data-green)">●</span> API locale · :7431</span>
          <span class="at-chip">~/dev/mon-app · git ✓</span>
          <span class="at-chip">kit v3.16.0</span>
          <span class="at-chip">standard · 36 patterns</span>
        </div>
        <h1 class="at-h1" style="font-size:1.7rem">Aucun projet Grimoire ici.</h1>
        <p class="at-lead" style="margin:8px 0 28px">Trois façons de commencer — la troisième n'engage à rien.</p>
        <div class="at-doors">
          <div class="at-card at-door reco">
            <span class="at-lbl" style="color:var(--accent)">Recommandé</span>
            <h3>Créer un projet</h3>
            <p>Trois étapes : nom &amp; chemin, profil de gouvernance, extensions de départ. La commande CLI exécutée est montrée.</p>
            <button class="at-btn pri" id="door-create">CRÉER →</button>
          </div>
          <div class="at-card at-door">
            <span class="at-lbl">Sans engagement</span>
            <h3>Ouvrir l'exemple</h3>
            <p>« Délégation gouvernée » — 5 nodes, simulable, compilable. Installe l'extension crewai qu'il requiert.</p>
            <button class="at-btn" id="door-example">EXPLORER L'EXEMPLE</button>
          </div>
          <div class="at-card at-door">
            <span class="at-lbl">Comprendre d'abord</span>
            <h3>Parcourir le catalogue</h3>
            <p>36 patterns, 11 catégories, les artefacts qu'ils échangent — la matière de tout blueprint.</p>
            <a class="at-btn" href="patterns.html">VOIR LES PATTERNS</a>
          </div>
        </div>
        <div style="margin-top:22px">
          <div class="at-lbl" style="margin-bottom:8px">Projets récents sur cette machine</div>
          <div class="at-card" style="padding:12px 16px">
            <span style="font-family:var(--font-mono);font-size:0.66rem;color:var(--ink-muted)">aucun — cette liste vit dans le registre local du kit, pas dans le navigateur</span>
          </div>
        </div>
      </div>`;
    }

    /* ═══ WIZARD ═══ */
    const wiz = { step: 1, name: 'mon-projet', where: 'current', profile: 'controlled', exts: [] };

    function wizardHtml() {
      const steps = ['Où', 'Comment', 'Avec quoi'];
      const dots = steps.map((s, i) =>
        `<span class="at-step-dot${wiz.step === i + 1 ? ' on' : ''}${wiz.step > i + 1 ? ' done' : ''}">${s}</span>`).join('');
      let body = '';
      if (wiz.step === 1) {
        body = `
          <div class="at-col">
            <div>
              <div class="at-lbl" style="margin-bottom:6px">Nom du projet</div>
              <input class="at-search" id="wiz-name" value="${esc(wiz.name)}" spellcheck="false" />
            </div>
            <label class="at-radio ${wiz.where === 'current' ? 'sel' : ''}"><input type="radio" name="where" value="current" ${wiz.where === 'current' ? 'checked' : ''} />
              <span><b>Dossier courant</b><span>~/dev/mon-app — dépôt git détecté ✓</span></span></label>
            <label class="at-radio ${wiz.where === 'new' ? 'sel' : ''}"><input type="radio" name="where" value="new" ${wiz.where === 'new' ? 'checked' : ''} />
              <span><b>Nouveau dossier</b><span>~/dev/&lt;nom-du-projet&gt;</span></span></label>
          </div>`;
      } else if (wiz.step === 2) {
        body = `<div class="at-col">` + PROFILES.map(p => `
          <label class="at-radio ${wiz.profile === p.id ? 'sel' : ''}"><input type="radio" name="profile" value="${p.id}" ${wiz.profile === p.id ? 'checked' : ''} />
            <span><b>${p.id}${p.reco ? ' <i style="color:var(--accent);font-style:normal;font-size:0.6rem">✦ recommandé</i>' : ''}</b><span>${p.desc}</span></span></label>`).join('') + `</div>`;
      } else {
        const opts = [
          { id: 'crewai',   name: 'CrewAI Bridge',          why: 'exécuter des crews sous contrat' },
          { id: 'langfuse', name: 'Langfuse Observability', why: 'exporter les traces' }
        ];
        body = `
          <p style="font-size:0.76rem;color:var(--ink-soft);margin-bottom:12px">Facultatif — tout s'installe aussi plus tard, depuis l'éditeur ou le marketplace.</p>
          <div class="at-col">` + opts.map(o => `
            <label class="at-radio ${wiz.exts.includes(o.id) ? 'sel' : ''}"><input type="checkbox" name="ext" value="${o.id}" ${wiz.exts.includes(o.id) ? 'checked' : ''} />
              <span><b>${o.name}</b><span>${o.why}</span></span></label>`).join('') + `</div>`;
      }
      const cmd = `grimoire init --profile ${wiz.profile}${wiz.exts.map(e => ' && grimoire ext add ' + e).join('')}`;
      return `
        <div class="at-steps">${dots}</div>
        <h2>${wiz.step === 1 ? 'Nom & chemin' : wiz.step === 2 ? 'Profil de gouvernance' : 'Extensions de départ'}</h2>
        <p style="font-family:var(--font-mono);font-size:0.6rem;color:var(--ink-muted);margin-bottom:16px">étape ${wiz.step}/3</p>
        ${body}
        <div style="margin-top:18px;padding:9px 12px;background:var(--elev-2);border:1px solid var(--line);border-radius:4px;font-family:var(--font-mono);font-size:0.62rem;color:var(--ink-soft)">$ ${esc(cmd)}</div>
        <div class="at-row sb" style="margin-top:18px">
          <button class="at-btn ghost" id="wiz-back">${wiz.step === 1 ? 'ANNULER' : '← RETOUR'}</button>
          <div class="at-row">
            ${wiz.step === 3 ? '<button class="at-btn" id="wiz-skip">PASSER</button>' : ''}
            <button class="at-btn pri" id="wiz-next">${wiz.step === 3 ? 'CRÉER LE PROJET →' : 'CONTINUER →'}</button>
          </div>
        </div>`;
    }

    function openWizard() {
      wiz.step = 1;
      let ov = document.createElement('div');
      ov.className = 'at-overlay'; ov.id = 'wiz-ov';
      ov.innerHTML = `<div class="at-modal" id="wiz-modal"></div>`;
      document.body.appendChild(ov);
      drawWizard();
      ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
    }

    function drawWizard() {
      const m = $('#wiz-modal');
      m.innerHTML = wizardHtml();
      m.querySelectorAll('input[name="where"]').forEach(i => i.addEventListener('change', () => { wiz.where = i.value; drawWizard(); }));
      m.querySelectorAll('input[name="profile"]').forEach(i => i.addEventListener('change', () => { wiz.profile = i.value; drawWizard(); }));
      m.querySelectorAll('input[name="ext"]').forEach(i => i.addEventListener('change', () => {
        wiz.exts = wiz.exts.includes(i.value) ? wiz.exts.filter(x => x !== i.value) : wiz.exts.concat(i.value);
        drawWizard();
      }));
      const nameInput = $('#wiz-name', m);
      if (nameInput) nameInput.addEventListener('input', () => { wiz.name = nameInput.value.trim() || 'mon-projet'; });
      $('#wiz-back', m).addEventListener('click', () => {
        if (wiz.step === 1) $('#wiz-ov').remove();
        else { wiz.step--; drawWizard(); }
      });
      const skip = $('#wiz-skip', m);
      if (skip) skip.addEventListener('click', () => { wiz.exts = []; createProject(); });
      $('#wiz-next', m).addEventListener('click', () => {
        if (wiz.step < 3) { wiz.step++; drawWizard(); }
        else createProject();
      });
    }

    function createProject() {
      const path = wiz.where === 'current' ? '~/dev/mon-app' : ('~/dev/' + wiz.name);
      Atelier.setProject({ name: wiz.name, path, profile: wiz.profile, createdAt: Date.now() });
      wiz.exts.forEach(id => Atelier.installExt(id));
      const ov = $('#wiz-ov'); if (ov) ov.remove();
      Atelier.toast('<b>' + esc(wiz.name) + '</b> créé — profil ' + esc(wiz.profile) + ' · project-context.yaml écrit', { good: true });
      render();
    }

    /* ═══ HUB ═══ */
    function relTime(ts) {
      const m = Math.round((Date.now() - ts) / 60000);
      if (m < 1) return 'à l\u2019instant';
      if (m < 60) return 'il y a ' + m + ' min';
      const h = Math.round(m / 60);
      return h < 24 ? 'il y a ' + h + ' h' : 'il y a ' + Math.round(h / 24) + ' j';
    }

    function hubView(proj) {
      const exts = Atelier.installedExts();
      const bps = Atelier.bpList();
      const arts = Atelier.artifacts();
      const isFresh = !bps.length && !arts.length;

      const bpRows = bps.map(id => {
        const g = Atelier.loadBp(id) || {};
        const meta = g.meta || {};
        const n = (g.nodes || []).length, e = (g.edges || []).length;
        return `<div class="at-card" style="padding:12px 14px;background:var(--elev-2)">
          <div class="at-row sb">
            <a href="blueprints.html?bp=${esc(id)}" style="font-family:var(--font-mono);font-size:0.76rem;color:var(--ink);text-decoration:none">${esc(id)}</a>
            <span class="at-sub">${n} node${n > 1 ? 's' : ''} · ${e} lien${e > 1 ? 's' : ''}</span>
          </div>
          <div class="at-row" style="gap:6px;margin-top:8px">
            <span class="at-status-tag ${meta.validated ? 'inst' : 'disp'}">${meta.validated ? 'validé ✓' : 'non validé'}</span>
            <span class="at-status-tag ${meta.simulated ? 'inst' : 'disp'}">${meta.simulated ? 'simulé ✓' : 'non simulé'}</span>
            <span class="at-status-tag ${meta.compiledAt ? 'maj' : 'disp'}">${meta.compiledAt ? 'compilé · ' + relTime(meta.compiledAt) : 'non compilé'}</span>
          </div>
        </div>`;
      }).join('') || `<p style="font-family:var(--font-mono);font-size:0.66rem;color:var(--ink-muted)">aucun blueprint — composez le premier.</p>`;

      const extRows = exts.map(id => {
        const e = Atelier.extById[id]; if (!e) return '';
        const shadow = (e.hooks || []).some(h => h.mode === 'shadow');
        return `<div class="at-row sb" style="padding:7px 2px;border-bottom:1px solid var(--line)">
          <span style="font-family:var(--font-mono);font-size:0.72rem">${esc(e.name)} <span style="color:var(--ink-muted)">v${esc(e.version)}</span></span>
          <span class="at-row" style="gap:6px">
            ${shadow ? '<span class="at-chip" style="font-size:0.54rem">hooks · shadow</span>' : ''}
            <span class="at-status-tag inst">à jour ✓</span>
          </span>
        </div>`;
      }).join('') || `<p style="font-family:var(--font-mono);font-size:0.66rem;color:var(--ink-muted)">aucune extension installée.</p>`;

      const lastArt = arts[0];
      const artTotals = arts.reduce((acc, a) => { Object.entries(a.items || {}).forEach(([k, v]) => acc[k] = (acc[k] || 0) + v); return acc; }, {});
      const artSummary = Object.keys(artTotals).length
        ? Object.entries(artTotals).map(([k, v]) => `${k} ${v}`).join(' · ')
        : 'aucun artefact — compilez un blueprint.';

      const shadowHooks = exts.reduce((n, id) => n + ((Atelier.extById[id] || {}).hooks || []).filter(h => h.mode === 'shadow').length, 0);

      return `
        <div class="at-row sb" style="margin-bottom:6px;align-items:flex-start">
          <div>
            <div class="at-h1-row" style="margin-bottom:4px"><h1 class="at-h1">${esc(proj.name)}</h1></div>
            <div class="at-sub">${esc(proj.path)} · git ✓ · profil ${esc(proj.profile)} · kit v3.16.0 · standard 36 patterns ✓</div>
          </div>
          <div class="at-row">
            <button class="at-btn sm ghost" id="hub-reset" title="Repartir de zéro (efface l'état du prototype)">⟲ RÉINITIALISER</button>
            <button class="at-btn sm" id="hub-new">NOUVEAU PROJET</button>
          </div>
        </div>
        <div class="at-row" style="gap:8px;margin:14px 0 22px;flex-wrap:wrap">
          <span class="at-chip">${bps.length} blueprint${bps.length > 1 ? 's' : ''}</span>
          <span class="at-chip">${exts.length} extension${exts.length > 1 ? 's' : ''}</span>
          <span class="at-chip">${arts.length} compilation${arts.length > 1 ? 's' : ''}</span>
          ${lastArt ? `<span class="at-chip acc">dernière compilation · ${relTime(lastArt.when)}</span>` : ''}
        </div>

        ${isFresh ? `
        <div class="at-card" style="border-color:var(--accent-dim);margin-bottom:16px">
          <div class="at-lbl" style="color:var(--accent);margin-bottom:10px">Trois prochaines actions</div>
          <div class="at-col" style="gap:8px">
            <div class="at-row sb"><span style="font-size:0.8rem"><b style="font-family:var(--font-mono);font-size:0.72rem">1</b> · Installer une extension d'exécution — crewai</span><a class="at-btn sm" href="extensions.html">MARKETPLACE →</a></div>
            <div class="at-row sb"><span style="font-size:0.8rem"><b style="font-family:var(--font-mono);font-size:0.72rem">2</b> · Composer un premier flow — guidé, moins de 2 minutes</span><a class="at-btn sm acc" href="blueprints.html">OUVRIR L'ÉDITEUR →</a></div>
            <div class="at-row sb"><span style="font-size:0.8rem"><b style="font-family:var(--font-mono);font-size:0.72rem">3</b> · Compiler — le blueprint devient artefacts, rien ne s'exécute</span><span class="at-sub">depuis l'éditeur</span></div>
          </div>
        </div>` : ''}

        <div class="at-grid2">
          <div class="at-card">
            <div class="at-row sb" style="margin-bottom:12px"><span class="at-lbl">Blueprints du projet</span><a class="at-btn sm" href="blueprints.html?new=1">+ NOUVEAU</a></div>
            <div class="at-col" style="gap:8px">${bpRows}</div>
          </div>
          <div class="at-card">
            <div class="at-row sb" style="margin-bottom:12px"><span class="at-lbl">Extensions installées</span><a class="at-btn sm" href="extensions.html">MARKETPLACE →</a></div>
            ${extRows}
          </div>
          <div class="at-card">
            <div class="at-row sb" style="margin-bottom:12px"><span class="at-lbl">Artefacts compilés</span><a class="at-btn sm ghost" href="observability.html">OBSERVATOIRE →</a></div>
            <p style="font-family:var(--font-mono);font-size:0.72rem;color:var(--ink-soft)">${esc(artSummary)}</p>
            ${lastArt ? `<p style="font-family:var(--font-mono);font-size:0.62rem;color:var(--ink-muted);margin-top:8px">dernière : ${esc(lastArt.bp)} → ${Object.values(lastArt.items).reduce((a, b) => a + b, 0)} artefacts <span class="at-chip acc" style="font-size:0.52rem;margin-left:6px">récents</span></p>` : ''}
          </div>
          <div class="at-card">
            <div class="at-lbl" style="margin-bottom:12px">Santé du projet</div>
            <div class="at-row sb" style="padding:4px 0"><span style="font-size:0.78rem;color:var(--ink-soft)">Validation des blueprints</span><span style="font-family:var(--font-mono);font-size:0.68rem;color:${bps.length && bps.every(id => (Atelier.loadBp(id) || {}).meta && Atelier.loadBp(id).meta.validated) ? 'var(--data-green)' : 'var(--ink-muted)'}">${bps.filter(id => (Atelier.loadBp(id) || {}).meta && Atelier.loadBp(id).meta.validated).length}/${bps.length} ✓</span></div>
            <div class="at-row sb" style="padding:4px 0"><span style="font-size:0.78rem;color:var(--ink-soft)">Manifestes d'extensions</span><span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--data-green)">${exts.length}/${exts.length} ✓</span></div>
            <div class="at-row sb" style="padding:4px 0"><span style="font-size:0.78rem;color:var(--ink-soft)">Hooks en attente de promotion</span><span style="font-family:var(--font-mono);font-size:0.68rem;color:${shadowHooks ? 'var(--data-amber)' : 'var(--ink-muted)'}">${shadowHooks ? shadowHooks + ' · shadow' : '0'}</span></div>
          </div>
        </div>`;
    }

    /* ═══ BIND ═══ */
    function bind(proj) {
      if (!proj) {
        $('#door-create').addEventListener('click', openWizard);
        $('#door-example').addEventListener('click', () => {
          Atelier.setProject({ name: 'mon-projet', path: '~/dev/mon-app', profile: 'controlled', createdAt: Date.now(), example: true });
          Atelier.installExt('crewai');
          Atelier.toast('Extension <b>crewai</b> installée (requise par l\u2019exemple) — ouverture de l\u2019éditeur…', { good: true });
          setTimeout(() => { location.href = 'blueprints.html?bp=onboarding-crew'; }, 900);
        });
      } else {
        $('#hub-new').addEventListener('click', openWizard);
        $('#hub-reset').addEventListener('click', () => {
          if (confirm('Réinitialiser le prototype ? (projet, blueprints, extensions, artefacts)')) {
            Atelier.clearProject(); render();
          }
        });
      }
    }

    render();
  })();
  </script>
</body>
</html>
