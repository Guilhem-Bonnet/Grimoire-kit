name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: "Build package"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          grimoire --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test:
    name: "Smoke test"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install and test
        run: |
          pip install dist/*.whl
          grimoire --version
          python -c "from grimoire.core.config import GrimoireConfig; print('SDK OK')"

  publish-testpypi:
    name: "Publish to TestPyPI"
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: testpypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [build, test, publish-testpypi]
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: "GitHub Release"
    runs-on: ubuntu-latest
    needs: publish-pypi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --oneline --no-merges "${PREV_TAG}..${TAG}")
          else
            NOTES=$(git log --oneline --no-merges -20)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.notes.outputs.notes }}

            ## Installation

            ```bash
            pip install grimoire-kit==${{ github.ref_name }}
            ```
          files: dist/*
          generate_release_notes: true
