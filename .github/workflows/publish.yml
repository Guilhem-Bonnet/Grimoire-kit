name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"

permissions:
  id-token: write

jobs:
  build:
    name: "Build package"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(python3 -c "
          import re, pathlib
          content = pathlib.Path('src/grimoire/__version__.py').read_text()
          m = re.search(r'__version__ = \"(.+)\"', content)
          print(m.group(1))
          ")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: __version__.py ($PKG_VERSION) != tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          grimoire --version

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          mkdir -p sbom
          cyclonedx-py environment --output-format json -o sbom/sbom.cdx.json
          echo "SBOM generated: sbom/sbom.cdx.json"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/

  test:
    name: "Smoke test"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Install and test
        run: |
          pip install dist/*.whl
          grimoire --version
          python -c "from grimoire.core.config import GrimoireConfig; print('SDK OK')"

  publish-testpypi:
    name: "Publish to TestPyPI"
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: testpypi
    # TestPyPI is optional — don't block PyPI publish if it fails
    continue-on-error: true
    steps:
      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 @ 2026-02-18
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: "Publish to PyPI"
    runs-on: ubuntu-latest
    needs: [build, test]
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 @ 2026-02-18
