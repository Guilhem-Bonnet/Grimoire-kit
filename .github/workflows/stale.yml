name: Stale Issues

on:
  schedule:
    - cron: "0 6 * * 1"  # Lundi 06h UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed in 14 days if no further
            activity occurs. Thank you for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed in 14 days if no
            further activity occurs.
          close-issue-message: >
            This issue was closed because it has been stalled for too long.
            Feel free to reopen if still relevant.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,help-wanted,security"
          exempt-pr-labels: "pinned"
          operations-per-run: 30
