name: Grimoire SDK CI

on:
  push:
    branches: [main, "grimoire/**"]
    paths:
      - "src/**"
      - "tests/unit/**"
      - "tests/test_agentic_standard.py"
      - "pyproject.toml"
      - ".github/workflows/ci-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/unit/**"
      - "tests/test_agentic_standard.py"
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: "Ruff lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/unit/ framework/memory/ --output-format=github

      - name: Code-size ratchet
        run: python scripts/check-code-ratchet.py

  typecheck:
    name: "mypy --strict"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy --strict src/grimoire/

  dep-audit:
    name: "Dependency audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package + pip-audit
        run: |
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Audit dependencies
        shell: bash
        run: |
          pip freeze --exclude-editable | grep -v '^grimoire-kit==' > audit-requirements.txt
          # Waivers gouvernés (issue #20) : les entrées actives de
          # .github/security/dependency-waivers.yaml deviennent des --ignore-vuln ;
          # un waiver expiré disparaît et l'audit redevient strict.
          IGNORE_FLAGS="$(python scripts/depaudit-waivers.py)"
          pip-audit --strict --desc $IGNORE_FLAGS -r audit-requirements.txt

  test:
    name: "Tests (Python ${{ matrix.python-version }}, ${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        exclude:
          # Keep matrix lean: Windows/macOS only on 3.12
          - os: windows-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pytest \
              tests/unit/cli/test_app.py::TestGlobalFlags \
              tests/unit/cli/test_app.py::TestVersion \
              tests/unit/cli/test_app.py::TestInit \
              tests/unit/cli/test_app.py::TestDoctor \
              tests/test_agentic_standard.py \
              -q --tb=short -x
          else
            pytest tests/unit/ tests/test_agentic_standard.py -q --tb=short -x \
              --cov=src/grimoire \
              --cov-report=xml \
              --cov-report=term-missing \
              --cov-fail-under=70
          fi

      - name: Upload coverage
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false

      - name: Report
        if: always()
        shell: bash
        run: |
          echo "### Python ${{ matrix.python-version }} Tests" >> $GITHUB_STEP_SUMMARY
          echo "See the test step logs for the full result." >> $GITHUB_STEP_SUMMARY

  build:
    name: "Build package"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, dep-audit, test]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          grimoire --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30
