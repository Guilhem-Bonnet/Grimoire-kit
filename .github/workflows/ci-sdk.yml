name: BMAD SDK CI

on:
  push:
    branches: [main, "bmad/**"]
    paths:
      - "src/**"
      - "tests/unit/**"
      - "pyproject.toml"
      - ".github/workflows/ci-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "tests/unit/**"
      - "pyproject.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Ruff lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/unit/ --output-format=github

  typecheck:
    name: "mypy --strict"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Type check
        run: mypy --strict src/bmad/

  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short -x

      - name: Report
        if: always()
        run: |
          echo "### Python ${{ matrix.python-version }} Tests" >> $GITHUB_STEP_SUMMARY
          pytest tests/unit/ -q --tb=line 2>&1 | tail -5 >> $GITHUB_STEP_SUMMARY || true

  build:
    name: "Build package"
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel
        run: |
          pip install dist/*.whl
          bmad --version

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30
