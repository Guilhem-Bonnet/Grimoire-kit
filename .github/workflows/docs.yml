name: Deploy site

# Publie le site statique Grimoire Kit (web/) sur GitHub Pages.
# La page Documentation rend les fichiers docs/*.md en direct (raw.githubusercontent),
# donc aucune étape de build n'est nécessaire — on uploade web/ tel quel.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/

      - id: deployment
        uses: actions/deploy-pages@v5
