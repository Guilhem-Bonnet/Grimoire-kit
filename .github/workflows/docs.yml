name: Deploy docs

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install docs dependencies
        run: pip install ".[docs]"

      - name: Build MkDocs site (→ site/docs/)
        run: mkdocs build --clean

      - name: Copy landing page to site root
        run: |
          # site_dir is site/docs/ per mkdocs.yml; copy web/ assets to site/ root
          cp -r web/. site/
          # guarantee landing is the root index
          test -f site/index.html
          test -d site/docs
          echo "── site/ tree ──"
          ls -la site/ | head -20

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
