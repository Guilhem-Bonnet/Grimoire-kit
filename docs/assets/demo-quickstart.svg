<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500" role="img" aria-label="Grimoire Kit quickstart demo: init, standard init, verify, score, gate">
  <style>
    .bg { fill: #0b1220; }
    .frame { fill: none; stroke: #1e2a45; stroke-width: 1.5; }
    .bar { fill: #101a30; }
    .dot-r { fill: #f47067; } .dot-y { fill: #f0c674; } .dot-g { fill: #57ab5a; }
    .title { fill: #8ca1ff; font: 12px ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; }
    text { font: 14px ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace; }
    .p  { fill: #8ca1ff; }                 /* prompt $ */
    .c  { fill: #e6edf3; }                 /* command */
    .o  { fill: #7d8ca3; }                 /* output */
    .ok { fill: #57ab5a; font-weight: bold; }
    .hi { fill: #c9a0ff; }
    .warn { fill: #f0c674; }
    .step { opacity: 0; animation: reveal .01s linear forwards; }
    .s1  { animation-delay: .4s; }
    .s2  { animation-delay: 1.6s; }
    .s3  { animation-delay: 2.4s; }
    .s4  { animation-delay: 3.6s; }
    .s5  { animation-delay: 4.4s; }
    .s6  { animation-delay: 5.8s; }
    .s7  { animation-delay: 6.6s; }
    .s8  { animation-delay: 7.8s; }
    .s9  { animation-delay: 8.6s; }
    .s10 { animation-delay: 9.8s; }
    .s11 { animation-delay: 10.6s; }
    .s12 { animation-delay: 11.6s; }
    @keyframes reveal { to { opacity: 1; } }
    .cursor { fill: #8ca1ff; opacity: 0; animation: reveal .01s linear 12.2s forwards; }
    .blink { animation: blink 1.1s step-end 12.2s infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <rect class="bg" x="0" y="0" width="880" height="500" rx="10"/>
  <rect class="frame" x="0.75" y="0.75" width="878.5" height="498.5" rx="10"/>
  <rect class="bar" x="1" y="1" width="878" height="34" rx="10"/>
  <rect class="bar" x="1" y="20" width="878" height="15"/>
  <circle class="dot-r" cx="22" cy="18" r="5.5"/>
  <circle class="dot-y" cx="42" cy="18" r="5.5"/>
  <circle class="dot-g" cx="62" cy="18" r="5.5"/>
  <text class="title" x="440" y="22" text-anchor="middle">grimoire-kit — governed quickstart</text>

  <g class="step s1">
    <text x="24" y="66"><tspan class="p">$</tspan> <tspan class="c">pipx install grimoire-kit</tspan></text>
  </g>
  <g class="step s2">
    <text x="24" y="94"><tspan class="p">$</tspan> <tspan class="c">grimoire init demo-app --archetype minimal</tspan></text>
  </g>
  <g class="step s3">
    <text x="24" y="120" class="o">project scaffolded — entrypoints: CLAUDE.md · AGENTS.md · GEMINI.md · .cursorrules · .mcp.json</text>
  </g>
  <g class="step s4">
    <text x="24" y="152"><tspan class="p">$</tspan> <tspan class="c">grimoire standard init . --needs solo-prototyping</tspan></text>
  </g>
  <g class="step s5">
    <text x="24" y="178" class="o">Install plan → profile <tspan class="hi">starter</tspan></text>
    <text x="24" y="200" class="o">  needs: solo-prototyping</text>
    <text x="24" y="222" class="o">  patterns: evidence-gated-fsm</text>
    <text x="24" y="244" class="o">  footprint: 1 pattern(s) · 0 external service(s)</text>
  </g>
  <g class="step s6">
    <text x="24" y="276"><tspan class="p">$</tspan> <tspan class="c">grimoire standard verify .</tspan></text>
  </g>
  <g class="step s7">
    <text x="24" y="302"><tspan class="ok">OK</tspan><tspan class="o"> agentic standard profile </tspan><tspan class="hi">starter</tspan><tspan class="o"> (0 error(s), </tspan><tspan class="warn">5 warning(s)</tspan><tspan class="o">)</tspan></text>
  </g>
  <g class="step s8">
    <text x="24" y="334"><tspan class="p">$</tspan> <tspan class="c">grimoire standard score .</tspan></text>
  </g>
  <g class="step s9">
    <text x="24" y="360"><tspan class="ok">OK</tspan><tspan class="o"> compliance score </tspan><tspan class="hi">81/70</tspan><tspan class="o"> → _grimoire-output/standard/bootstrap/compliance-score.yaml</tspan></text>
  </g>
  <g class="step s10">
    <text x="24" y="392"><tspan class="p">$</tspan> <tspan class="c">grimoire standard gate check .</tspan></text>
  </g>
  <g class="step s11">
    <text x="24" y="418"><tspan class="ok">OK</tspan><tspan class="o"> evidence gates for task bootstrap</tspan></text>
  </g>
  <g class="step s12">
    <text x="24" y="450" class="o">fail-closed governance: missing evidence ⇒ the gate fails, not the promise.</text>
  </g>
  <g class="cursor blink">
    <rect x="24" y="466" width="9" height="16"/>
  </g>
</svg>
