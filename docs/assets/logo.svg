<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!--
    Grimoire Kit — Official Logo
    Design: Open spellbook with hexagonal sigil + emanating energy
    Usage: favicon, social, docs, about pages
    Responsive: works from 16px to 512px
  -->
  <defs>
    <linearGradient id="coverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0e30"/>
    </linearGradient>
    <linearGradient id="spineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a0e30"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#1a0e30"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dff5"/>
      <stop offset="100%" stop-color="#d4c5ed"/>
    </linearGradient>
    <linearGradient id="sigilGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a0ff"/>
      <stop offset="50%" stop-color="#a371f7"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a0ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8957e5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a0ff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#a371f7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a371f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bookClip">
      <rect x="60" y="100" width="392" height="320" rx="8"/>
    </clipPath>
  </defs>

  <!-- Ambient glow behind book -->
  <circle cx="256" cy="260" r="220" fill="url(#ambientGlow)"/>

  <!-- === BOOK BODY === -->
  <!-- Back cover shadow -->
  <rect x="68" y="108" width="376" height="308" rx="12" fill="#0d0618" opacity="0.5"/>

  <!-- Left cover -->
  <path d="M80 115 C80 107, 86 101, 94 101 L248 101 L248 405 L94 405 C86 405, 80 399, 80 391 Z"
    fill="url(#coverGrad)" stroke="#3d2066" stroke-width="2"/>

  <!-- Right cover -->
  <path d="M264 101 L418 101 C426 101, 432 107, 432 115 L432 391 C432 399, 426 405, 418 405 L264 405 Z"
    fill="url(#coverGrad)" stroke="#3d2066" stroke-width="2"/>

  <!-- Spine -->
  <rect x="244" y="101" width="24" height="304" fill="url(#spineGrad)" stroke="#3d2066" stroke-width="1"/>
  <!-- Spine ridges -->
  <line x1="248" y1="130" x2="264" y2="130" stroke="#4a2d73" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="248" y1="150" x2="264" y2="150" stroke="#4a2d73" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="248" y1="355" x2="264" y2="355" stroke="#4a2d73" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="248" y1="375" x2="264" y2="375" stroke="#4a2d73" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left page (resting on cover) -->
  <path d="M92 112 L245 112 L245 395 L92 395 C88 395, 85 392, 85 388 L85 119 C85 115, 88 112, 92 112 Z"
    fill="url(#pageGrad)" opacity="0.9"/>

  <!-- Right page -->
  <path d="M267 112 L420 112 C424 112, 427 115, 427 119 L427 388 C427 392, 424 395, 420 395 L267 395 Z"
    fill="url(#pageGrad)" opacity="0.9"/>

  <!-- Page text lines — left -->
  <g opacity="0.2" stroke="#4a2d73" stroke-width="2" stroke-linecap="round">
    <line x1="105" y1="145" x2="230" y2="145"/>
    <line x1="105" y1="162" x2="225" y2="162"/>
    <line x1="105" y1="179" x2="218" y2="179"/>
    <line x1="105" y1="196" x2="228" y2="196"/>
    <line x1="105" y1="325" x2="222" y2="325"/>
    <line x1="105" y1="342" x2="230" y2="342"/>
    <line x1="105" y1="359" x2="210" y2="359"/>
    <line x1="105" y1="376" x2="226" y2="376"/>
  </g>

  <!-- Page text lines — right -->
  <g opacity="0.2" stroke="#4a2d73" stroke-width="2" stroke-linecap="round">
    <line x1="282" y1="145" x2="410" y2="145"/>
    <line x1="282" y1="162" x2="405" y2="162"/>
    <line x1="282" y1="179" x2="398" y2="179"/>
    <line x1="282" y1="196" x2="408" y2="196"/>
    <line x1="282" y1="325" x2="402" y2="325"/>
    <line x1="282" y1="342" x2="410" y2="342"/>
    <line x1="282" y1="359" x2="390" y2="359"/>
    <line x1="282" y1="376" x2="406" y2="376"/>
  </g>

  <!-- === CENTRAL SIGIL === -->
  <!-- Core glow -->
  <circle cx="256" cy="260" r="75" fill="url(#coreGlow)"/>

  <!-- Outer hexagon -->
  <polygon points="256,192 311.4,225 311.4,293 256,326 200.6,293 200.6,225"
    fill="none" stroke="url(#sigilGrad)" stroke-width="2.5" opacity="0.8"/>

  <!-- Inner hexagon (rotated 30deg) -->
  <g transform="rotate(30, 256, 260)">
    <polygon points="256,212 297,234 297,286 256,308 215,286 215,234"
      fill="none" stroke="url(#sigilGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Six-pointed star (hexagram) from two overlapping triangles -->
  <!-- Triangle pointing up -->
  <polygon points="256,198 303,278 209,278"
    fill="none" stroke="url(#sigilGrad)" stroke-width="2" opacity="0.6"/>
  <!-- Triangle pointing down -->
  <polygon points="256,322 303,242 209,242"
    fill="none" stroke="url(#sigilGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Center diamond -->
  <polygon points="256,240 276,260 256,280 236,260"
    fill="url(#sigilGrad)" opacity="0.25"/>
  <polygon points="256,240 276,260 256,280 236,260"
    fill="none" stroke="url(#sigilGrad)" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="260" r="5" fill="#c9a0ff"/>
  <circle cx="256" cy="260" r="3" fill="#fff" opacity="0.8"/>

  <!-- Connecting lines from center to hexagon vertices -->
  <g stroke="url(#sigilGrad)" stroke-width="0.8" opacity="0.35">
    <line x1="256" y1="260" x2="256" y2="192"/>
    <line x1="256" y1="260" x2="311.4" y2="225"/>
    <line x1="256" y1="260" x2="311.4" y2="293"/>
    <line x1="256" y1="260" x2="256" y2="326"/>
    <line x1="256" y1="260" x2="200.6" y2="293"/>
    <line x1="256" y1="260" x2="200.6" y2="225"/>
  </g>

  <!-- Small circles at hexagon vertices -->
  <g fill="url(#sigilGrad)">
    <circle cx="256" cy="192" r="4"/>
    <circle cx="311.4" cy="225" r="4"/>
    <circle cx="311.4" cy="293" r="4"/>
    <circle cx="256" cy="326" r="4"/>
    <circle cx="200.6" cy="293" r="4"/>
    <circle cx="200.6" cy="225" r="4"/>
  </g>

  <!-- === ENERGY EMANATION === -->
  <!-- Orbital arcs -->
  <g fill="none" stroke-linecap="round">
    <path d="M256 92 C310 92, 355 110, 370 145"
      stroke="url(#sigilGrad)" stroke-width="1.5" opacity="0.3"/>
    <path d="M142 145 C157 110, 202 92, 256 92"
      stroke="url(#sigilGrad)" stroke-width="1.5" opacity="0.3"/>
    <path d="M350 152 C375 185, 375 220, 368 240"
      stroke="#c9a0ff" stroke-width="1" opacity="0.2"/>
    <path d="M144 240 C137 220, 137 185, 162 152"
      stroke="#c9a0ff" stroke-width="1" opacity="0.2"/>
  </g>

  <!-- Floating particles -->
  <circle cx="180" cy="105" r="3" fill="#c9a0ff" opacity="0.6"/>
  <circle cx="332" cy="100" r="2.5" fill="#a371f7" opacity="0.5"/>
  <circle cx="155" cy="140" r="2" fill="#8957e5" opacity="0.4"/>
  <circle cx="357" cy="135" r="2" fill="#c9a0ff" opacity="0.4"/>
  <circle cx="256" cy="78" r="3.5" fill="#a371f7" opacity="0.7"/>
  <circle cx="380" cy="170" r="1.8" fill="#c9a0ff" opacity="0.35"/>
  <circle cx="132" cy="175" r="1.5" fill="#a371f7" opacity="0.3"/>
  <circle cx="210" cy="85" r="1.5" fill="#c9a0ff" opacity="0.45"/>
  <circle cx="305" cy="82" r="2" fill="#8957e5" opacity="0.4"/>

  <!-- === COVER CORNER EMBELLISHMENTS === -->
  <!-- Top-left -->
  <path d="M90 115 L90 130 M90 115 L105 115" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Top-right -->
  <path d="M422 115 L422 130 M422 115 L407 115" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Bottom-left -->
  <path d="M90 391 L90 376 M90 391 L105 391" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Bottom-right -->
  <path d="M422 391 L422 376 M422 391 L407 391" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Cover border inset decoration -->
  <rect x="95" y="110" width="148" height="289" rx="4" fill="none" stroke="#a371f7" stroke-width="0.6" opacity="0.15"/>
  <rect x="269" y="110" width="148" height="289" rx="4" fill="none" stroke="#a371f7" stroke-width="0.6" opacity="0.15"/>
</svg>
