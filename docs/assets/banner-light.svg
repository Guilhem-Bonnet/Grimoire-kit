<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6f8fa"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f6f8fa"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8250df"/>
      <stop offset="50%" stop-color="#6e40c9"/>
      <stop offset="100%" stop-color="#553098"/>
    </linearGradient>
    <linearGradient id="glowSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8250df" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#6e40c9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#553098" stop-opacity="0.1"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#d0d7de" stroke-width="0.3"/>
    </pattern>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8250df" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8250df" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)"/>
  <rect width="900" height="320" fill="url(#grid)" opacity="0.5"/>
  
  <!-- Ambient orbs -->
  <circle cx="150" cy="80" r="120" fill="url(#orbGlow)"/>
  <circle cx="750" cy="240" r="100" fill="url(#orbGlow)"/>
  <circle cx="450" cy="160" r="180" fill="url(#orbGlow)" opacity="0.5"/>
  
  <!-- Decorative runes - left -->
  <g opacity="0.1" fill="url(#glow)">
    <text x="60" y="100" font-family="serif" font-size="28">&#x2727;</text>
    <text x="30" y="180" font-family="serif" font-size="22">&#x2726;</text>
    <text x="80" y="250" font-family="serif" font-size="18">&#x2728;</text>
    <text x="110" y="140" font-family="serif" font-size="15">&#x2735;</text>
  </g>
  
  <!-- Decorative runes - right -->
  <g opacity="0.1" fill="url(#glow)">
    <text x="820" y="90" font-family="serif" font-size="22">&#x2726;</text>
    <text x="850" y="200" font-family="serif" font-size="28">&#x2727;</text>
    <text x="790" y="260" font-family="serif" font-size="15">&#x2735;</text>
    <text x="830" y="150" font-family="serif" font-size="18">&#x2728;</text>
  </g>

  <!-- Book icon -->
  <g transform="translate(310, 65)">
    <rect x="0" y="20" width="60" height="75" rx="4" fill="#f6f8fa" stroke="url(#glow)" stroke-width="2"/>
    <rect x="0" y="20" width="12" height="75" rx="2" fill="#eaeef2" stroke="url(#glow)" stroke-width="1"/>
    <line x1="18" y1="35" x2="50" y2="35" stroke="#d0d7de" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="45" x2="50" y2="45" stroke="#d0d7de" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="55" x2="50" y2="55" stroke="#d0d7de" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="18" y1="65" x2="42" y2="65" stroke="#d0d7de" stroke-width="1.5" stroke-linecap="round"/>
    <text x="30" y="60" text-anchor="middle" font-family="serif" font-size="26" fill="url(#glow)">&#x2726;</text>
    <circle cx="55" cy="15" r="2" fill="#8250df" opacity="0.5"/>
    <circle cx="65" cy="30" r="1.5" fill="#6e40c9" opacity="0.4"/>
    <circle cx="-5" cy="10" r="1.5" fill="#8250df" opacity="0.5"/>
  </g>

  <!-- Title soft layer -->
  <text x="450" y="131" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="59" font-weight="800" letter-spacing="-1" fill="url(#glowSoft)">Grimoire Kit</text>
  <!-- Main Title -->
  <text x="450" y="130" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" letter-spacing="-1" fill="url(#glow)">Grimoire Kit</text>
  
  <!-- Subtitle line -->
  <line x1="280" y1="152" x2="620" y2="152" stroke="url(#glow)" stroke-width="1" opacity="0.2"/>
  
  <!-- Tagline -->
  <text x="450" y="180" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="18" fill="#656d76" letter-spacing="2">COMPOSABLE AI AGENT PLATFORM</text>
  
  <!-- Feature pills -->
  <g transform="translate(130, 215)">
    <rect width="130" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="14" y="21" font-size="14">&#x1F3E2;</text>
    <text x="34" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#1f2328" font-weight="500">Team of Teams</text>
  </g>
  
  <g transform="translate(275, 215)">
    <rect width="145" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="14" y="21" font-size="14">&#x1F9E0;</text>
    <text x="36" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#1f2328" font-weight="500">Semantic Memory</text>
  </g>
  
  <g transform="translate(435, 215)">
    <rect width="120" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="14" y="21" font-size="14">&#x1F504;</text>
    <text x="36" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#1f2328" font-weight="500">93+ Tools</text>
  </g>
  
  <g transform="translate(570, 215)">
    <rect width="115" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="14" y="21" font-size="14">&#x1F6E1;</text>
    <text x="36" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#1f2328" font-weight="500">Self-Healing</text>
  </g>
  
  <g transform="translate(700, 215)">
    <rect width="95" height="32" rx="16" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
    <text x="14" y="21" font-size="14">&#x26A1;</text>
    <text x="34" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" fill="#1f2328" font-weight="500">IDE-First</text>
  </g>
  
  <!-- Version badge -->
  <g transform="translate(370, 270)">
    <rect width="160" height="26" rx="13" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.4"/>
    <text x="80" y="18" text-anchor="middle" font-family="'Segoe UI Mono', 'Cascadia Code', monospace" font-size="12" fill="#6e40c9" letter-spacing="1">v2.4.1 · MIT License</text>
  </g>
  
  <!-- Bottom decorative line -->
  <line x1="0" y1="318" x2="900" y2="318" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>
</svg>
