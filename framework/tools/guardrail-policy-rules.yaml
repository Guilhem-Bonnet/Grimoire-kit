followThrough:
  taskMap:
    quick-check: 'grimoire: quickcheck'
    memory-lint: 'grimoire: memory-lint'
    preflight: 'grimoire: preflight'
  taskSpecs:
    'grimoire: quickcheck':
      flow: quality
      command:
        - bash
        - framework/tools/quick-check.sh
      timeoutSeconds: 240
    'grimoire: memory-lint':
      flow: memory
      command:
        - .venv/bin/python
        - framework/tools/memory-lint.py
        - --project-root
        - .
      timeoutSeconds: 240
    'grimoire: preflight':
      flow: quality
      command:
        - .venv/bin/python
        - framework/tools/preflight-check.py
        - --project-root
        - .
      timeoutSeconds: 240