$schema: "grimoire-knowledge-source-registry/v1"

metadata:
  project: ""
  owner: ""
  purpose: "External indexed knowledge base for agentic flows."

rules:
  knowledge_is_not_memory: true
  knowledge_is_not_session_context: true
  explicit_source_of_truth_required: true
  stale_source_must_be_disclosed: true

sources:
  - id: ""
    type: "folder | git_repository | url | api | mcp | database | object_storage"
    locator: ""
    enabled: true
    indexing:
      mode: "manual | scheduled | webhook | on_demand"
      cadence: ""
      parser: "markdown | code | openapi | generic"
      chunking_policy: ""
      embedding_profile: ""
    trust:
      level: "low | medium | high | authoritative"
      source_of_truth: false
      owner: ""
      freshness_sla: ""
    access:
      allowed_agents: []
      forbidden_data_classes: []
      network_required: false
    evidence:
      last_indexed_at: ""
      index_manifest: ""
      known_gaps: []
