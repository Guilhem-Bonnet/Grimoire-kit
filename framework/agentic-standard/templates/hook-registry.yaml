$schema: "grimoire-agentic-standard-hook-registry/v1"
metadata:
  project: ""
  generated_by: "grimoire standard init"
known_phases:
  - pre_context_build
  - post_context_build
  - pre_provider_call
  - post_provider_call
  - pre_tool_call
  - post_tool_call
  - pre_state_transition
  - post_state_transition
  - pre_release
  - on_failure
  - on_rollback
known_actions:
  - allow
  - warn
  - block
  - redact
  - reroute
  - require_evidence
  - escalate
  - create_remediation
  - rollback
hooks:
  - id: context.require-task
    phase: pre_context_build
    action: block
    rule_ref: task.exists
    reason: "Context cannot be built for an undeclared task."
  - id: provider.require-declared-route
    phase: pre_provider_call
    action: block
    rule_ref: provider.no-undeclared-route
    reason: "Provider routes must be declared before use."
  - id: release.require-score
    phase: pre_release
    action: block
    rule_ref: release.score-minimum
    reason: "Release requires profile-specific compliance score."
  - id: release.governed-requires-all-gates
    phase: pre_release
    action: block
    rule_ref: release.gates-satisfied
    reason: "Governed and production releases require all evidence gates satisfied."
    profiles:
      - governed
      - production
  - id: knowledge.auto-graph-on-context-build
    phase: post_context_build
    action: create_remediation
    rule_ref: knowledge.graph-current
    reason: "Context builds should refresh the local doc-to-graph view when knowledge sources are enabled."
  - id: memory.hot-soft-gate
    phase: pre_context_build
    action: require_evidence
    rule_ref: memory.hot-degrades-safely
    reason: "Redis hot memory may be absent, but the degradation must be recorded and durable stores remain authoritative."
    implementation_ref: ".github/hooks/grimoire-memory-gate.json"
    script_ref: ".github/hooks/scripts/grimoire-memory-gate.sh"
  - id: tools.terminal-guard
    phase: pre_tool_call
    action: block
    rule_ref: hooks.no-destructive-bypass
    reason: "Terminal and tool calls that can mutate state must pass safety/evidence checks."
    implementation_ref: ".github/hooks/grimoire-terminal-guard.json"
    script_ref: ".github/hooks/scripts/grimoire-terminal-guard.sh"
  - id: hooks.gateway-required
    phase: pre_tool_call
    action: block
    rule_ref: hooks.must-use-gateway
    reason: "Project hooks should execute through the Grimoire hook gateway for traceability and policy mediation."
    implementation_ref: ".github/hooks/scripts/grimoire-hook-gateway.sh"
  - id: skills.require-classification
    phase: pre_context_build
    action: require_evidence
    rule_ref: skills.classified-before-use
    reason: "Skills must be classified before being promoted into core Kit templates or governed project packs."
    implementation_ref: ".github/skills"
# managed_sources classifies project hooks and skills before they are promoted.
# core_template_candidates: reusable, governance-relevant assets shipped/recommended by the Kit.
# project_pack: assets specific to one consumer project (fill in per project).
# incubator: experimental assets not yet eligible for governed promotion.
managed_sources:
  hooks:
    core_template_candidates:
      - ".github/hooks/grimoire-memory-gate.json"
      - ".github/hooks/grimoire-terminal-guard.json"
      - ".github/hooks/grimoire-doc-drift.json"
      - ".github/hooks/scripts/grimoire-hook-gateway.sh"
    project_pack: []
    incubator: []
  skills:
    core_template_candidates:
      - ".github/skills/grimoire-code-review/SKILL.md"
      - ".github/skills/grimoire-security-review/SKILL.md"
      - ".github/skills/grimoire-verification/SKILL.md"
      - ".github/skills/grimoire-writing-plans/SKILL.md"
      - ".github/skills/grimoire-test-architecture/SKILL.md"
    project_pack: []
    incubator: []
