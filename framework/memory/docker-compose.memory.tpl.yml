# Docker Compose — Qdrant pour développement local Grimoire
# Généré par : grimoire init --qdrant-docker
#
# Usage :
#   docker compose -f docker-compose.memory.yml up -d
#   docker compose -f docker-compose.memory.yml down
#
# Dashboard : http://localhost:6333/dashboard

services:
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "${GRIMOIRE_QDRANT_PORT:-6333}:6333"
      - "${GRIMOIRE_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "${GRIMOIRE_REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "no", "--save", ""]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  qdrant_storage:
