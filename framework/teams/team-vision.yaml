team:
  name: "team-vision"
  display_name: "Team Vision — Product & Strategy"
  icon: "🔭"
  version: "1.0.0"
  description: "Transforme les idées bruites en specs validées prêtes pour Team Build. Propriétaire du WHY et du QUOI."

  agents:
    - name: "pm"
      role: "Lead — pilote le PRD et les interviews utilisateurs"
      required: true
    - name: "analyst"
      role: "Support — market research, competitive landscape, data"
      required: true
    - name: "ux-designer"
      role: "Support — UX specs, user journeys, wireframes verbaux"
      required: true
    - name: "innovation-strategist"
      role: "Support — disruption analysis, blue ocean, Jobs-to-be-Done"
      required: false

  specialty: "Product Discovery, Market Research, PRD, UX Strategy"
  out_of_scope:
    - "Implémentation technique — délégué à Team Build"
    - "Infrastructure et déploiement — délégué à Team Ops"
    - "Architecture low-level — recommandations seulement"

  inputs:
    required:
      - name: "project-context.yaml"
        description: "Contexte projet : nom, stack, utilisateurs cibles, contraintes"
        path_pattern: "_grimoire/_memory/project-context.yaml"
    optional:
      - name: "competitive-data"
        description: "Données marché existantes, analyses concurrentes"
      - name: "user-feedback"
        description: "Retours utilisateurs existants, tickets support, analytics"

  outputs:
    deliverables:
      - name: "PRD validé"
        format: "Markdown"
        path_pattern: "_grimoire-output/planning-artifacts/PRD-*.md"
        acceptance_criteria: "Toutes les sections PRD remplies, user stories avec ACs, priorités définies"
      - name: "UX Specs"
        format: "Markdown"
        path_pattern: "_grimoire-output/planning-artifacts/UX-specs-*.md"
        acceptance_criteria: "User journeys complets, composants UI listés, états d'erreur définis"
      - name: "Delivery Contract vers Team Build"
        format: "Markdown"
        path_pattern: "_grimoire-output/contracts/vision-to-build-*.md"
        acceptance_criteria: "Tous les deliverables cochés, contrat signé par PM"
    optional_deliverables:
      - name: "Market Research Report"
        condition: "Si marché peu connu ou projet B2C"
      - name: "Innovation Workshop Notes"
        condition: "Si projet disruptif ou changement de stratégie"

  sla:
    estimated_steps: 8
    estimated_tokens: "80K-150K tokens"
    blocking_conditions:
      - "PRD accepté sans questions ouvertes critiques"
      - "UX Specs couvrent tous les flows principaux"
      - "Delivery Contract signé par Team Lead (PM)"

  delivery_workflow:
    phases:
      - phase: 1
        name: "Discovery & Research"
        agents_active: ["analyst", "pm"]
        steps:
          - "Lire project-context.yaml"
          - "Recherche concurrentielle (3-5 concurrents)"
          - "Définir les personas utilisateurs (2-3 max)"
          - "Identifier les Jobs-to-be-Done"
        output: "discovery-notes.md dans _grimoire-output/team-vision/"
      - phase: 2
        name: "PRD Creation"
        agents_active: ["pm", "analyst"]
        steps:
          - "Structurer le PRD (vision, problème, solution, ACs)"
          - "Définir les métriques de succès"
          - "Prioriser les features (MoSCoW)"
          - "Validation PRD interne"
        output: "PRD-{project}-v{n}.md"
      - phase: 3
        name: "UX Design"
        agents_active: ["ux-designer", "pm"]
        steps:
          - "User journeys pour chaque persona"
          - "Mapping des composants UI nécessaires"
          - "États : normal, chargement, erreur, empty state"
          - "Revue UX vs ACs du PRD"
        output: "UX-specs-{project}-v{n}.md"
      - phase: 4
        name: "Handoff Preparation"
        agents_active: ["pm"]
        steps:
          - "Vérifier que tous les deliverables sont complets"
          - "Rédiger le Delivery Contract"
          - "Signer le contrat"
          - "Notifier Team Build [*→dev] dans shared-context.md"
        output: "contracts/vision-to-build-{date}.md"

  team_context:
    directory: "_grimoire-output/team-vision/"
    files:
      - name: "team-context.md"
        description: "Résumé du contexte discovery : personas, JTBD, insights marché"
      - name: "decision-log.md"
        description: "Décisions produit prises et leur justification"
    shared_with: ["team-build"]

  allowed_tools:
    - "read_file"
    - "create_file"
    - "replace_string_in_file"
    - "semantic_search"
    - "grep_search"
    - "list_dir"

  handoff:
    to_team: "team-build"
    trigger: "PRD validé + UX Specs complètes + Delivery Contract signé"
    contract_template: "framework/delivery-contract.tpl.md"

  prompts_directory: ".github/prompts/team-vision/"
