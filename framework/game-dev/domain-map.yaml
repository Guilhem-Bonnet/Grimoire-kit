$schema: "grimoire-game-dev-domain-map/v1"

metadata:
  id: game-dev-domain-map
  version: "0.1.0"
  owner: grimoire-kit
  upstream_standard:
    name: "Standard de structure agentique — cluster jeu vidéo"
    repository: "processus-developpement-agentique"
    canonical_entrypoints:
      - "docs/patterns/guide-jeux-video.md"
      - "docs/patterns/07-use-cases/README.md"
      - "docs/patterns/catalogue-skills-jeux-video.md"
      - "docs/patterns/profils-genres-jeux-video.md"
      - "docs/patterns/matrice-capacites-modalites-jeux-video.md"
  bundled_knowledge: "framework/game-dev/knowledge/"
  intent: >
    Map the upstream agentic game-dev cluster (use-cases UC-08..UC-50, the skill
    aisles A..AC, genre lenses, and the capability/modality matrix) to concrete
    Grimoire Kit artifacts: an archetype, discipline agents, templates, and
    evidence-gated gates. Grimoire Kit consumes and traces the standard; it does
    not redefine it.

principles:
  - id: gdd-is-upstream-truth
    rule: "The Game Design Document and bible are the single versioned source of truth; generated content traces back to them."
  - id: deterministic-simulation
    rule: "Any tested simulation is replayable: seed, fixed step, state hash. Determinism is required for tests, replays, and netcode debugging."
  - id: evidence-gated-milestones
    rule: "A milestone, certification, or live change is reached by proof, never by declaration."
  - id: capability-routing
    rule: "Out of an LLM's core competence (art, audio, 3D, video), route to the capable target (specialized model, DCC tool, or human) rather than producing a mediocre final asset."
  - id: telemetry-driven-liveops
    rule: "Live tuning of balance or economy requires telemetry and canary; every live patch is rollback-able or compensable."

# ─────────────────────────────────────────────────────────────────────────────
# Règles normatives du domaine (invariants). Portées par l'archétype game-dev.
# ─────────────────────────────────────────────────────────────────────────────
normative_rules:
  - id: GR-01
    rule: "Le GDD est l'unique source de vérité ; tout contenu généré s'y rattache explicitement."
    use_cases: [UC-08]
    socle: [QUA-01, ORC-06]
  - id: GR-02
    rule: "Aucun contenu hors classification d'âge ; scan contre le rating déclaré avant intégration et soumission."
    use_cases: [UC-15, UC-47]
    socle: [GOV-08]
  - id: GR-03
    rule: "La simulation testée est déterministe : seed, pas fixe et hash d'état obligatoires."
    use_cases: [UC-13]
    socle: [RUN-13]
  - id: GR-04
    rule: "La certification est une gate de preuve : pas de soumission sans cert dry-run vert et evidence pack."
    use_cases: [UC-15]
    socle: [GOV-02, QUA-05]
  - id: GR-05
    rule: "Pas d'ajustement live sans télémétrie ni canary."
    use_cases: [UC-16, UC-10]
    socle: [GOV-10]
  - id: GR-06
    rule: "Pas de changement d'équilibrage sans non-régression."
    use_cases: [UC-10]
    socle: [QUA-05]
  - id: GR-07
    rule: "Gate de validation de contenu avant merge : budgets, références, naming, cohérence lore."
    use_cases: [UC-12, UC-09]
    socle: [GOV-08]
  - id: GR-08
    rule: "Build reproductible et jalon prouvé : build tagué et reproductible, jalon atteint par preuve."
    use_cases: [UC-15]
    socle: [QUA-05]
  - id: GR-09
    rule: "Tout patch live est rejouable ou compensable : rollback ou compensation prévue."
    use_cases: [UC-16]
    socle: [RUN-14, GOV-17]

