repos:
  # ── Grimoire Completion Contract ────────────────────────────────────────────────
  - repo: local
    hooks:
      - id: grimoire-pre-commit-cc
        name: "🔒 Grimoire — Completion Contract"
        entry: bash framework/hooks/pre-commit-cc.sh
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types_or: [go, ts, tsx, python, shell]

      - id: grimoire-mnemo-consolidate
        name: "🧠 Grimoire — Mnemo consolidation mémoire"
        entry: bash framework/hooks/mnemo-consolidate.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [pre-commit]

      - id: grimoire-commit-msg
        name: "📝 Grimoire — Commit message validation"
        entry: bash framework/hooks/commit-msg.sh
        language: system
        stages: [commit-msg]

      - id: grimoire-post-commit-trace
        name: "📋 Grimoire — TRACE audit trail"
        entry: bash framework/hooks/post-commit.sh
        language: system
        always_run: true
        pass_filenames: false
        stages: [post-commit]

  # ── Qualité générale ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "(_grimoire-output/|framework/prompt-templates/)"
      - id: end-of-file-fixer
        exclude: "(_grimoire-output/|_grimoire/_memory/)"
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: "_grimoire/_memory/"
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: "docs/|examples/"

  # ── Shell scripts ────────────────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-contributors/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [--severity=warning, --shell=bash]
        files: "\\.sh$"
        exclude: "framework/hooks/(post-checkout|post-commit)\\.sh"  # hooks tiers OK

  # ── Python ───────────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
        files: "\\.py$"
      - id: ruff-format
        files: "\\.py$"

  # ── YAML ─────────────────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, "{extends: relaxed, rules: {line-length: {max: 120}}}"]
        exclude: "_grimoire/_memory/|_grimoire-output/"
