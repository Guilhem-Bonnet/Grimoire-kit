site_name: Grimoire Kit
site_description: Composable AI Agent Platform — personas, memory, workflows, and quality automation.
site_url: https://guilhem-bonnet.github.io/Grimoire-kit/
repo_url: https://github.com/Guilhem-Bonnet/Grimoire-kit
repo_name: Guilhem-Bonnet/Grimoire-kit
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Mode clair
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  language: fr

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_style: numpy
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/presentation-onepager.css

extra_javascript:
  - javascripts/presentation-onepager.js

nav:
  - Accueil: index.md
  - Presentation & Decouverte: presentation-decouverte.md
  - Démarrage:
      - Quick Start: getting-started.md
      - Setup VS Code: vscode-setup.md
      - Onboarding: onboarding.md
  - Concepts:
      - Architecture: concepts.md
      - Mémoire: memory-system.md
      - Workflows: workflow-design-patterns.md
      - Taxonomie Workflows: workflow-taxonomy.md
  - Guides:
      - SDK Python: sdk-guide.md
      - Créer un agent: creating-agents.md
      - Archétypes: archetype-guide.md
      - Intégration MCP: mcp-integration.md
      - Observatory API: observatory-api.md
      - Référence YAML: grimoire-yaml-reference.md
  - Référence:
      - CLI: cli-reference.md
      - Configuration: config-reference.md
      - API: api-reference.md
      - Changelog: changelog.md
  - Migration:
      - v2 → v3: migration-v2-v3.md
  - Aide:
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
  - Guides avancés:
      - Plugin Development: plugin-development.md
  - ADR:
      - "001 — No Multi-LLM": adr-001-no-multi-llm.md
