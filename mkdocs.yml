site_name: Grimoire Kit
site_description: Plateforme agentique composable avec rôles, mémoire, workflows et automatisation qualité.
site_url: https://guilhem-bonnet.github.io/Grimoire-kit/docs/
repo_url: https://github.com/Guilhem-Bonnet/Grimoire-kit
repo_name: Guilhem-Bonnet/Grimoire-kit
edit_uri: edit/main/grimoire-kit/docs/
site_dir: site/docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Mode clair
  font:
    text: Geist
    code: Geist Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    - announce.dismiss
  icon:
    repo: fontawesome/brands/github
  language: fr

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source
            docstring_style: numpy
            show_if_no_docstring: false

hooks:
  - mkdocs_hooks/signals.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/forge-kit-theme.css
  - stylesheets/presentation-onepager.css

extra_javascript:
  - javascripts/presentation-onepager.js

nav:
  - Accueil: index.md
  - Présentation & Découverte: presentation-decouverte.md
  - Signaux & nouveautés: signaux.md
  - Démarrage:
    - Guide de démarrage: getting-started.md
    - Configuration VS Code: vscode-setup.md
    - Démarrage progressif: onboarding.md
  - Concepts:
      - Architecture: concepts.md
      - Standard agentique: agentic-standard-integration.md
      - Mémoire: memory-system.md
      - Workflows: workflow-design-patterns.md
      - Taxonomie Workflows: workflow-taxonomy.md
      - Guardrails runtime agentiques: grimoire-game-runtime-guardrails.md
  - Guides:
      - Guide SDK Python: sdk-guide.md
      - Créer un pack: pack-quickstart.md
      - Créer un agent: creating-agents.md
      - Archétypes: archetype-guide.md
      - Intégration MCP: mcp-integration.md
      - API Observatory: observatory-api.md
      - Référence YAML: grimoire-yaml-reference.md
  - Référence:
      - CLI: cli-reference.md
      - Configuration: config-reference.md
      - API: api-reference.md
      - Changelog: changelog.md
  - Migration:
      - v2 → v3: migration-v2-v3.md
  - Aide:
      - FAQ: faq.md
      - Dépannage: troubleshooting.md
  - Guides avancés:
      - Développement de plugins: plugin-development.md
  - ADR:
      - "001 — No Multi-LLM": adr-001-no-multi-llm.md
      - "002 — SemVer Policy": adr-002-semver-policy.md
