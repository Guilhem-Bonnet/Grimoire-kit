  # ollama_url: "http://localhost:11434"  # si ollama
  # embedding_model: "sentence-transformers/all-MiniLM-L6-v2"  # modèle d'embedding
  # collection_prefix: "grimoire"          # préfixe des collections Qdrant

agents:
  archetype: "minimal"
  custom_agents: []

installed_archetypes: []               # Rempli par grimoire-init.sh install

